<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>คลังตำราและยุทโธปกรณ์</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Tactical Theme */
  --primary: #2e7d32; 
  --primary-dark: #1b5e20;
  --secondary: #ffca28;
  --bg: #0a0a0a; --surface: #121212; --surf2: #1e1e1e;
  --border: #333333; --text: #e0e0e0; --muted: #888888;
  
  --pdf: #ff5252;    /* Red for PDF */
  --video: #ffca28;  /* Gold for Video */
  --link: #4caf50;   /* Green for Links */
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

/* Background effect */
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 20px 20px; z-index: -1;}

/* Loaders */
.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.spinner { width: 45px; height: 45px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; opacity: 0; pointer-events: none; }

/* Custom Modal Alert */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-transform: uppercase;}
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
.ca-btn { width: 100%; padding: 12px 0; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(46,125,50,0.3);}
.ca-btn:active { transform: scale(0.96); box-shadow: none;}

/* UI Structure */
.top-bar { background: var(--surface); padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
.t-app { font-weight: 800; font-size: 18px; color: var(--secondary); display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;}
.t-close { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'Sarabun'; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

.filter-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; background: var(--bg); border-bottom: 1px solid var(--border); }
.filter-bar::-webkit-scrollbar { display: none; }
.f-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer; white-space: nowrap; transition: 0.2s; }
.f-btn.active { background: rgba(46,125,50,0.15); border-color: var(--primary); color: var(--primary); }

.main-area { flex: 1; padding: 16px; overflow-y: auto; }
.grid-lib { display: grid; grid-template-columns: 1fr; gap: 12px; }

/* Cards */
.lib-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
.lib-card:active { transform: scale(0.98); background: var(--surf2); }
.icon-box { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; color: #fff;}
.icon-pdf { background: linear-gradient(135deg, var(--pdf), #b71c1c); box-shadow: 0 4px 10px rgba(255,82,82,0.3);}
.icon-video { background: linear-gradient(135deg, var(--video), #f57f17); box-shadow: 0 4px 10px rgba(255,202,40,0.3);}
.icon-link { background: linear-gradient(135deg, var(--link), #1b5e20); box-shadow: 0 4px 10px rgba(76,175,80,0.3);}

.lib-content { flex: 1; overflow: hidden; }
.lib-title { font-weight: 700; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.lib-cat { font-size: 11px; font-weight: 800; color: var(--muted); background: var(--bg); padding: 2px 6px; border-radius: 4px; display: inline-block; border: 1px solid var(--border);}

/* Video Modal */
.modal-video { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px; }
.modal-video.show { opacity: 1; pointer-events: auto; }
.video-wrap { width: 100%; max-width: 600px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid var(--border);}
.close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s;}
.close-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- Loading -->
<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="color:var(--muted); font-weight:700;">กำลังรวบรวมยุทโธปกรณ์...</div>
</div>

<!-- Custom Alert -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <button class="ca-btn" onclick="document.getElementById('custom-alert').classList.remove('active')">รับทราบ</button>
  </div>
</div>

<div class="top-bar">
  <div class="t-app">📚 คลังตำราและยุทโธปกรณ์</div>
  <button class="t-close" onclick="liff.closeWindow()">กลับศูนย์ข้อมูล</button>
</div>

<div class="filter-bar" id="filter-bar">
  <!-- Categories injected here -->
</div>

<div class="main-area">
  <div class="grid-lib" id="lib-list"></div>
</div>

<!-- Video Modal -->
<div id="modal-video" class="modal-video" onclick="closeVideo(event)">
  <button class="close-btn" onclick="closeVideo(event)">✕</button>
  <div class="video-wrap">
    <iframe id="video-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<script>
const LIFF_ID = '2009717287-o7MWqsbp'; // << [ใส่ LIFF ID ของหน้า Library]
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let materials = [];
let currentFilter = 'ALL';

function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('custom-alert').classList.add('active');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    const res = await callAPI('GET', { action: 'get_library_data' });
    if (res.status === 'error') throw new Error(res.message);
    
    materials = res.materials || [];
    renderFilters();
    renderList();
    
    document.getElementById('ov-load').classList.add('hidden');
  } catch(e) {
    document.getElementById('ov-load').classList.add('hidden');
    customAlert(e.message, 'การเชื่อมต่อขัดข้อง', '📡');
  }
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const cats = [...new Set(materials.map(m => m.category || 'รปป.'))];
  
  let html = `<div class="f-btn active" onclick="setFilter('ALL', this)">ทั้งหมด (${materials.length})</div>`;
  cats.forEach(c => {
    const count = materials.filter(m => (m.category || 'รปป.') === c).length;
    html += `<div class="f-btn" onclick="setFilter('${escapeHtml(c)}', this)">${escapeHtml(c)} (${count})</div>`;
  });
  bar.innerHTML = html;
}

function setFilter(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('lib-list');
  list.innerHTML = '';
  
  let filtered = materials;
  if (currentFilter !== 'ALL') {
    filtered = materials.filter(m => (m.category || 'รปป.') === currentFilter);
  }
  
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:14px; margin-top:20px;">ไม่พบข้อมูลยุทโธปกรณ์/สื่อในหมวดนี้</div>';
    return;
  }
  
  filtered.forEach(m => {
    let iconClass = 'icon-link';
    let iconEmoji = '🔗';
    
    if (m.type === 'PDF') { iconClass = 'icon-pdf'; iconEmoji = '📄'; }
    else if (m.type === 'VIDEO') { iconClass = 'icon-video'; iconEmoji = '▶️'; }
    
    list.innerHTML += `
      <div class="lib-card" onclick="handleItemClick('${escapeHtml(m.type)}', '${escapeHtml(m.url)}')">
        <div class="icon-box ${iconClass}">${iconEmoji}</div>
        <div class="lib-content">
          <div class="lib-title">${escapeHtml(m.title)}</div>
          <div class="lib-cat">${escapeHtml(m.category || 'ทั่วไป')}</div>
        </div>
      </div>
    `;
  });
}

function handleItemClick(type, url) {
  if (type === 'VIDEO') {
    // แยก YouTube ID แล้วสร้าง Embed URL
    let videoId = '';
    const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?]+)/);
    if (match && match[1]) { videoId = match[1]; }
    
    if (videoId) {
      document.getElementById('video-frame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      document.getElementById('modal-video').classList.add('show');
    } else {
      openMaterial(url);
    }
  } else {
    openMaterial(url);
  }
}

function closeVideo(e) {
  if (e && e.target.id !== 'modal-video' && e.target.className !== 'close-btn') return;
  document.getElementById('video-frame').src = ''; 
  document.getElementById('modal-video').classList.remove('show');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function openMaterial(url) {
  liff.openWindow({ url: url, external: true });
}

async function callAPI(method, params, timeoutMs=20000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL, opts = { signal:ctrl.signal, redirect:'follow' };
    if (method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts.method = 'GET'; } 
    else { opts.method  = 'POST'; opts.headers = { 'Content-Type':'text/plain' }; opts.body = JSON.stringify(params); }
    const resp = await fetch(url, opts);
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

init();
</script>
</body>
</html>
