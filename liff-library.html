<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<!-- ป้องกันการซูมหน้าจอเมื่อผู้ใช้พิมพ์ในช่องค้นหา (เฉพาะ Mobile App) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>คลังตำราและยุทโธปกรณ์</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── 1. Design Tokens & Variables (ธีมสีสไตล์แอปสมัยใหม่) ── */
:root {
  --primary:      #2e7d32;
  --primary-soft: rgba(46, 125, 50, 0.15);
  --secondary:    #ffca28;
  --bg-app:       #0f0f13; /* ปรับสีพื้นหลังให้เป็นสีเทาเข้มแบบแอป */
  --surface:      #1c1c1e; /* สีของการ์ด ให้เด้งออกมาจากพื้นหลัง */
  --surface-hover:#2c2c2e;
  --border:       rgba(255, 255, 255, 0.08);
  --text-main:    #ffffff;
  --text-muted:   #98989d; /* สีรองที่อ่านง่าย */
  --icon-pdf:     #ff453a;
  --icon-video:   #ff9f0a;
  --icon-link:    #32d74b;
  
  --spacing-sm:   8px;
  --spacing-md:   16px; /* มาตรฐาน Spacing สำหรับ Mobile */
  --spacing-lg:   24px;
  --radius-md:    12px;
  --radius-lg:    16px; /* มุมโค้งแบบแอป iOS/Android ใหม่ */
}

/* ── 2. Base & Reset ── */
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent; /* ปิดแถบไฮไลท์สีฟ้าเวลากดในมือถือ */
}
body { 
  font-family: 'Sarabun', sans-serif; 
  background-color: var(--bg-app); 
  color: var(--text-main); 
  min-height: 100vh; 
  display: flex; 
  flex-direction: column; 
  overflow-x: hidden; 
  line-height: 1.5; /* เพิ่ม line-height ให้อ่านง่าย */
}

/* ลายตารางพื้นหลังแบบจางๆ */
.bg-grid { 
  position: fixed; inset: 0; 
  background-image: 
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px); 
  background-size: 24px 24px; 
  z-index: -1; 
  opacity: 0.5;
}

/* ── 3. Layout Components (Mobile First) ── */

/* Top Bar (Sticky ให้อยู่ด้านบนเสมอ) */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(28, 28, 30, 0.85); /* โปร่งแสงนิดๆ */
  backdrop-filter: blur(12px); /* เอฟเฟกต์กระจกแบบแอป */
  -webkit-backdrop-filter: blur(12px);
  padding: var(--spacing-md);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.app-title {
  font-weight: 800;
  font-size: 18px;
  color: var(--secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
/* ปุ่มปิด: ขยายพื้นที่กด (Touch target >= 44px) */
.btn-close {
  background: var(--surface-hover);
  border: none;
  color: var(--text-main);
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  min-height: 36px; /* ให้กดง่าย */
  transition: transform 0.1s, background 0.2s;
}
.btn-close:active { transform: scale(0.95); background: #3a3a3c; }

/* Search Area */
.search-container {
  padding: var(--spacing-md);
  background: var(--bg-app);
}
.search-box {
  position: relative;
  width: 100%;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--text-muted);
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-main);
  padding: 12px 14px 12px 40px; /* เว้นที่ให้ไอคอนค้นหา */
  border-radius: var(--radius-md);
  font-family: 'Sarabun', sans-serif;
  font-size: 16px; /* 16px ป้องกัน iOS Zoom อัตโนมัติ */
  outline: none;
  transition: all 0.2s ease;
  min-height: 48px; /* Touch target ใหญ่ขึ้น */
}
.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-soft);
}
.search-input::placeholder { color: var(--text-muted); }

/* Filter Bar (Scroll แนวนอน) */
.filter-scroll {
  display: flex;
  gap: 10px;
  padding: 0 var(--spacing-md) var(--spacing-md) var(--spacing-md);
  overflow-x: auto;
  scrollbar-width: none; /* Firefox */
}
.filter-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */
.filter-btn {
  padding: 8px 16px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
  user-select: none;
  min-height: 36px;
}
.filter-btn.active {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: #4caf50;
}

/* ── 4. Main Content & Cards (Mobile First Grid) ── */
.main-content {
  flex: 1;
  padding: 0 var(--spacing-md) var(--spacing-lg) var(--spacing-md);
}

.item-grid {
  display: grid;
  grid-template-columns: 1fr; /* ค่าเริ่มต้น Mobile = 1 แถว */
  gap: 12px;
}

/* Card UI สมัยใหม่ */
.card-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  gap: 16px;
  align-items: center;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.2s ease;
}
.card-item:active {
  transform: scale(0.97); /* แอนิเมชันกดสมูทๆ */
  background: var(--surface-hover);
}

.card-icon {
  width: 48px; /* ไอคอนใหญ่ขึ้นนิดนึงให้อ่านง่าย */
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  color: #fff;
}
.type-pdf { background: linear-gradient(135deg, var(--icon-pdf), #b71c1c); }
.type-video { background: linear-gradient(135deg, var(--icon-video), #f57f17); }
.type-link { background: linear-gradient(135deg, var(--icon-link), #1b5e20); }

.card-details {
  flex: 1;
  min-width: 0; /* สำคัญมาก: ช่วยให้ text-overflow ทำงานใน flexbox */
}
.card-title {
  font-weight: 600;
  font-size: 16px;
  color: var(--text-main);
  margin-bottom: 6px;
  line-height: 1.4;
  /* ✨ แก้ข้อความล้น: ตัดคำขึ้นบรรทัดใหม่ และให้โชว์แค่ 2 บรรทัด */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: normal; 
}
.card-badge {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
}

/* ── 5. Modals & Loaders ── */
.overlay {
  position: fixed; inset: 0;
  background: var(--bg-app);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.3s ease;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Alert Box */
.alert-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.alert-overlay.active { opacity: 1; pointer-events: auto; }
.alert-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  width: 100%; max-width: 340px;
  text-align: center;
  transform: translateY(20px);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.alert-overlay.active .alert-box { transform: translateY(0); }
.alert-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius-md);
  font-size: 16px; font-weight: 700; font-family: 'Sarabun';
  cursor: pointer; border: none;
  background: var(--primary); color: #fff;
  margin-top: 24px;
}

/* Video Modal */
.video-overlay {
  position: fixed; inset: 0;
  background: #000; /* สีดำสนิทสำหรับวิดีโอ */
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.video-overlay.show { opacity: 1; pointer-events: auto; }
.video-wrapper {
  width: 100%; max-width: 800px;
  aspect-ratio: 16/9;
  background: #000;
}
.btn-close-video {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(255,255,255,0.2);
  border: none; color: #fff;
  width: 44px; height: 44px; /* Touch target 44px */
  border-radius: 50%; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(4px);
}

/* ── 6. Responsive (Tablet & Desktop) ── */
@media (min-width: 600px) {
  .item-grid { grid-template-columns: repeat(2, 1fr); } /* แท็บเล็ต 2 แถว */
}
@media (min-width: 1024px) {
  .item-grid { grid-template-columns: repeat(3, 1fr); } /* PC 3 แถว */
  body { margin: 0 auto; max-width: 1200px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- Loading State -->
<div id="loader" class="overlay">
  <div class="spinner"></div>
  <div style="color:var(--text-muted); font-weight:600; font-size:15px;">กำลังโหลดยุทโธปกรณ์...</div>
</div>

<!-- Alert Custom -->
<div id="custom-alert" class="alert-overlay" role="dialog" aria-modal="true">
  <div class="alert-box">
    <div id="alert-icon" style="font-size:54px; line-height:1; margin-bottom:16px;">⚠️</div>
    <div id="alert-title" style="font-size:20px; font-weight:800; margin-bottom:8px;">แจ้งเตือน</div>
    <div id="alert-msg" style="font-size:15px; color:var(--text-muted); line-height:1.5;">ข้อความ</div>
    <button class="alert-btn" onclick="document.getElementById('custom-alert').classList.remove('active')">รับทราบ</button>
  </div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="app-title">📚 คลังยุทโธปกรณ์</div>
  <button class="btn-close" onclick="liff.closeWindow()">กลับสู่ศูนย์</button>
</header>

<!-- Search -->
<div class="search-container">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" id="search-input" placeholder="ค้นหาตำรา / วิดีโอ..." oninput="onSearch(this.value)">
  </div>
</div>

<!-- Filters -->
<nav class="filter-scroll" id="filter-bar"></nav>

<!-- Main List -->
<main class="main-content">
  <div class="item-grid" id="item-grid"></div>
</main>

<!-- Video Player -->
<div id="video-modal" class="video-overlay">
  <button class="btn-close-video" id="btn-close-video" aria-label="ปิดวิดีโอ">✕</button>
  <div class="video-wrapper">
    <iframe id="video-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen title="วิดีโอ"></iframe>
  </div>
</div>

<script>
const LIFF_ID = '2009717287-o7MWqsbp';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let materials = [];
let currentFilter = 'ALL';
let currentSearch = '';

// ── Alert Handler ──
function showAlert(msg, title = 'แจ้งเตือน', icon = '⚠️') {
  document.getElementById('alert-icon').textContent = icon;
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('custom-alert').classList.add('active');
}

// ── Initialization ──
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const res = await callAPI('GET', { action:'get_library_data' });
    if (res.status === 'error') throw new Error(res.message);

    materials = res.materials || [];
    renderFilters();
    renderList();
    
    // Smooth hide loader
    setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
    }, 300);

  } catch(e) {
    document.getElementById('loader').classList.add('hidden');
    showAlert(e.message || 'โหลดข้อมูลล้มเหลว', 'การเชื่อมต่อขัดข้อง', '📡');
  }
}

// ── Filters Rendering ──
function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const cats = [...new Set(materials.map(m => m.category || 'ทั่วไป'))];

  bar.innerHTML = '';
  bar.appendChild(createFilterBtn('ALL', `ทั้งหมด (${materials.length})`, true));

  cats.forEach(c => {
    const count = materials.filter(m => (m.category || 'ทั่วไป') === c).length;
    bar.appendChild(createFilterBtn(c, `${c} (${count})`));
  });
}

function createFilterBtn(cat, label, isActive = false) {
  const btn = document.createElement('div');
  btn.className = 'filter-btn' + (isActive ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  };
  return btn;
}

// ── Search Logic ──
function onSearch(val) {
  currentSearch = val.trim().toLowerCase();
  renderList();
}

// ── List Rendering ──
function renderList() {
  const grid = document.getElementById('item-grid');
  grid.innerHTML = '';

  let filtered = materials;
  if (currentFilter !== 'ALL') {
    filtered = filtered.filter(m => (m.category || 'ทั่วไป') === currentFilter);
  }
  if (currentSearch) {
    filtered = filtered.filter(m =>
      m.title.toLowerCase().includes(currentSearch) ||
      (m.category || '').toLowerCase().includes(currentSearch)
    );
  }

  if (!filtered.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--text-muted);">
        <div style="font-size:40px; margin-bottom:12px;">📂</div>
        <div style="font-size:16px;">ไม่พบสื่อที่ค้นหาในหมวดหมู่นี้</div>
      </div>`;
    return;
  }

  filtered.forEach(m => {
    let iconClass = 'type-link', iconEmoji = '🔗';
    if (m.type === 'PDF')   { iconClass = 'type-pdf'; iconEmoji = '📄'; }
    if (m.type === 'VIDEO') { iconClass = 'type-video'; iconEmoji = '▶️'; }

    const card = document.createElement('div');
    card.className = 'card-item';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');

    // สร้างโครงสร้างการ์ด
    card.innerHTML = `
      <div class="card-icon ${iconClass}">${iconEmoji}</div>
      <div class="card-details">
        <div class="card-title">${m.title}</div>
        <div class="card-badge">${m.category || 'ทั่วไป'}</div>
      </div>
    `;

    // ผูก Event
    card.addEventListener('click', () => handleItemClick(m.type, m.url));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') handleItemClick(m.type, m.url); });

    grid.appendChild(card);
  });
}

// ── Interaction Logic ──
function handleItemClick(type, url) {
  if (type === 'VIDEO') {
    const videoId = extractYouTubeId(url);
    if (videoId) {
      openVideo(videoId);
      return;
    }
  }
  liff.openWindow({ url, external: true });
}

function extractYouTubeId(url) {
  const m = String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?#]{11})/);
  return m ? m[1] : null;
}

// ── Video Modal Logic ──
const videoModal = document.getElementById('video-modal');
const videoFrame = document.getElementById('video-frame');

function openVideo(videoId) {
  videoFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  videoModal.classList.add('show');
  document.body.style.overflow = 'hidden'; // ป้องกันพื้นหลังเลื่อน
}

function closeVideo() {
  videoFrame.src = ''; // ตัดเสียงทันทีเมื่อปิด
  videoModal.classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('btn-close-video').addEventListener('click', closeVideo);

// ปิดเมื่อกดพื้นที่สีดำรอบๆ
videoModal.addEventListener('click', e => {
  if (e.target === videoModal) closeVideo();
});

// รองรับการปัดกลับ (Back gesture) ในมือถือ
window.addEventListener('popstate', () => {
  if (videoModal.classList.contains('show')) {
    closeVideo();
  }
});

// ── API Caller ──
async function callAPI(method, params, timeoutMs = 20000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL;
    let opts = { signal: ctrl.signal, redirect: 'follow' };
    
    if (method === 'GET') {
      url += '?' + new URLSearchParams(params).toString();
      opts.method = 'GET';
    } else {
      opts.method = 'POST';
      opts.headers = { 'Content-Type': 'text/plain' };
      opts.body = JSON.stringify(params);
    }
    
    const resp = await fetch(url, opts);
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    if (e.name === 'AbortError') throw new Error('หมดเวลาเชื่อมต่อ (Timeout)');
    throw e;
  }
}

// เริ่มต้นการทำงาน
init();
</script>
</body>
</html>
