<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>แฟลชการ์ดฝึกทบทวน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  /* Tactical Theme */
  --primary: #2e7d32; 
  --secondary: #ffca28;
  --bg: #0a0a0a; --surface: #121212; --surf2: #1e1e1e;
  --border: #333333; --text: #e0e0e0; --muted: #888888;
  --success: #4caf50; --danger: #ff5252;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Radar Background */
.bg-radar { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(46, 125, 50, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; }
.bg-radar::after { content:''; position:absolute; inset:0; background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(46, 125, 50, 0.05) 1px, rgba(46, 125, 50, 0.05) 2px); background-size: 100% 4px; z-index:-1;}

.screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; position: absolute; inset: 0; padding: 20px; transition: 0.3s; }
.hidden { display: none !important; opacity: 0; pointer-events: none; }

/* Setup & End Screen */
.panel-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px 24px; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; overflow: hidden;}
.panel-box::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--primary); }
.app-icon { font-size: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(46,125,50,0.5));}
.title { font-size: 26px; font-weight: 800; margin-bottom: 5px; color: var(--text); text-transform: uppercase; letter-spacing: 1px;}
.subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

.btn { width: 100%; padding: 14px 16px; border-radius: 10px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.btn-primary { background: linear-gradient(135deg, var(--primary), #1b5e20); color: #fff; }
.btn-outline { background: var(--surf2); border: 1px solid var(--border); color: var(--text); box-shadow: none;}
.btn:active { transform: scale(0.96); box-shadow: none;}

/* Game UI */
.top-hud { position: absolute; top: 0; left: 0; right: 0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);}
.hud-score { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 800; color: var(--secondary); text-shadow: 0 0 10px rgba(255,202,40,0.4);}
.hud-count { font-size: 14px; color: var(--muted); font-weight: 700; }

.card-container { position: relative; width: 100%; max-width: 320px; height: 400px; perspective: 1000px; margin-top: 20px;}
.flashcard { position: absolute; width: 100%; height: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: grab; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: 50% 100%; user-select: none; }
.flashcard:active { cursor: grabbing; }

.fc-category { position: absolute; top: 16px; left: 16px; font-size: 11px; font-weight: 800; color: var(--secondary); background: rgba(255,202,40,0.1); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,202,40,0.3);}
.fc-hint { position: absolute; bottom: 16px; font-size: 12px; color: var(--muted); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

.fc-front { font-size: 22px; font-weight: 800; color: var(--text); }
.fc-back { display: none; flex-direction: column; gap: 12px; width: 100%; }
.fc-ans-item { background: var(--surf2); border: 1px solid var(--border); padding: 12px; border-radius: 10px; font-size: 15px; color: var(--muted); }
.fc-ans-correct { border-color: var(--success); color: var(--success); font-weight: 800; background: rgba(76,175,80,0.1); }

.flashcard.flipped .fc-front { display: none; }
.flashcard.flipped .fc-back { display: flex; }
.flashcard.flipped .fc-hint { display: none; }

.controls-hud { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 40px; padding: 0 20px; z-index: 10;}
.ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.2s; color: #fff;}
.btn-bad { background: linear-gradient(135deg, var(--danger), #b71c1c); border: 2px solid #ff8a80;}
.btn-good { background: linear-gradient(135deg, var(--success), #1b5e20); border: 2px solid #b9f6ca;}
.ctrl-btn:active { transform: scale(0.9) translateY(4px); box-shadow: none; }

/* Leaderboard */
.lb-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; width: 100%; max-height: 50vh; overflow-y: auto; margin-bottom: 20px; text-align: left; }
.lb-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px dashed var(--border); }
.lb-item:last-child { border-bottom: none; }

/* Loader */
.ov-load { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.spinner { width: 45px; height: 45px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }

/* Custom Modal */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 50px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-transform: uppercase;}
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
.ca-btn { width: 100%; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; border: none; background: var(--primary); color: #fff;}
</style>
</head>
<body>
<div class="bg-radar"></div>

<div id="ov-load" class="ov-load">
  <div class="spinner"></div>
  <div style="color:var(--muted); font-weight:700;">กำลังรวบรวมข้อมูลฝึกทบทวน...</div>
</div>

<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <button class="ca-btn" onclick="document.getElementById('custom-alert').classList.remove('active')">รับทราบ</button>
  </div>
</div>

<!-- Start Screen -->
<div id="start-ui" class="screen hidden">
  <div class="panel-box">
    <div class="app-icon">🪖</div>
    <div class="title">แฟลชการ์ดประจัญบาน</div>
    <div class="subtitle">ปัดขวา "จำได้" ปัดซ้าย "จำไม่ได้"<br>ทบทวนความรู้และ รปป. ยิ่งจำได้มากยิ่งได้แต้มยุทธวิธีสูง!</div>
    
    <button class="btn btn-primary" onclick="startGame()">▶️ เริ่มฝึกทบทวน</button>
    <button class="btn btn-outline" onclick="showLeaderboard()">🏆 ทำเนียบผู้เชี่ยวชาญ</button>
    <button class="btn btn-outline" style="background:transparent; border-color:transparent; margin-top:5px; font-size:14px;" onclick="liff.closeWindow()">กลับศูนย์ข้อมูล</button>
  </div>
</div>

<!-- Game Screen -->
<div id="game-ui" class="screen hidden" style="padding:0;">
  <div class="top-hud">
    <div class="hud-count" id="g-count">ใบที่ 1 / 10</div>
    <div class="hud-score" id="g-score">0</div>
  </div>

  <div class="card-container" id="card-stack"></div>

  <div class="controls-hud" id="ctrl-hud" style="display:none;">
    <button class="ctrl-btn btn-bad" onclick="handleSwipe('left')">❌</button>
    <button class="ctrl-btn btn-good" onclick="handleSwipe('right')">✅</button>
  </div>
</div>

<!-- End Screen -->
<div id="end-ui" class="screen hidden">
  <div class="panel-box">
    <div class="app-icon" style="font-size:70px;">🎯</div>
    <div class="title" style="color:var(--secondary);">เสร็จสิ้นการฝึก</div>
    <div class="subtitle" style="margin-bottom:10px;">แต้มยุทธวิธีที่ทำได้</div>
    
    <div style="font-size:50px; font-weight:800; color:var(--success); font-family:'IBM Plex Mono'; text-shadow:0 0 20px rgba(76,175,80,0.5); margin-bottom:24px;" id="end-score">0</div>
    
    <button class="btn btn-primary" onclick="startGame()">🔄 ฝึกทบทวนอีกครั้ง</button>
    <button class="btn btn-outline" onclick="showLeaderboardFromEnd()">🏆 ดูทำเนียบผู้เชี่ยวชาญ</button>
  </div>
</div>

<!-- Leaderboard Screen -->
<div id="lb-ui" class="screen hidden">
  <div class="title" style="font-size:22px; margin-bottom:5px;">🏆 ทำเนียบผู้เชี่ยวชาญ</div>
  <div class="subtitle">จัดอันดับจากแต้มการทบทวนสูงสุด</div>
  
  <div id="lb-loading" style="color:var(--secondary); margin: 20px 0; font-weight:700;">กำลังตรวจสอบข้อมูล...</div>
  <div class="lb-container" id="lb-list" style="display:none;"></div>
  
  <button class="btn btn-outline" onclick="closeLeaderboard()">← กลับสู่เมนูหลัก</button>
</div>

<script>
const LIFF_ID = '2009717287-411iVMXe'; // << [ใส่ LIFF ID ของหน้า Flashcard]
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let allQs = [], deck = [];
let currentIdx = 0, score = 0, combo = 0;
let userId = '';
let currentCardEl = null;

// Touch Drag Logic
let startX = 0, startY = 0, currentX = 0, currentY = 0;
let isDragging = false, isFlipped = false;

function customAlert(msg) {
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('custom-alert').classList.add('active');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    userId = (await liff.getProfile()).userId;
    const data = await callAPI('GET', { action:'get_questions', userId: userId });
    
    if (data.status === 'error') throw new Error(data.message);
    allQs = data.questions || [];
    if (allQs.length === 0) throw new Error(`ไม่พบข้อมูลในคลังทบทวน`);

    document.getElementById('ov-load').classList.add('hidden');
    document.getElementById('start-ui').classList.remove('hidden');
  } catch(e) {
    document.getElementById('ov-load').innerHTML = `<div style="font-size:50px;">⚠️</div><p style="color:var(--danger); margin-top:10px;">${e.message}</p>`;
  }
}

function startGame() {
  document.getElementById('start-ui').classList.add('hidden');
  document.getElementById('end-ui').classList.add('hidden');
  document.getElementById('game-ui').classList.remove('hidden');
  
  score = 0; combo = 0; currentIdx = 0;
  updateHud();
  
  // สุ่มมา 10 ข้อสำหรับการฝึกทบทวน 1 รอบ
  deck = [...allQs].sort(() => Math.random() - 0.5).slice(0, 10);
  renderCard();
}

function updateHud() {
  document.getElementById('g-score').textContent = score;
  document.getElementById('g-count').textContent = `ใบที่ ${Math.min(currentIdx + 1, deck.length)} / ${deck.length}`;
}

function renderCard() {
  const stack = document.getElementById('card-stack');
  stack.innerHTML = '';
  document.getElementById('ctrl-hud').style.display = 'none';
  
  if (currentIdx >= deck.length) {
    endGame();
    return;
  }
  
  updateHud();
  isFlipped = false;
  const q = deck[currentIdx];
  
  const el = document.createElement('div');
  el.className = 'flashcard';
  
  let backHtml = '';
  ['A','B','C','D'].forEach(k => {
    if(q.choices[k]) {
      const isAns = q.correctAnswer === k;
      backHtml += `<div class="fc-ans-item ${isAns ? 'fc-ans-correct' : ''}">${q.choices[k]}</div>`;
    }
  });

  el.innerHTML = `
    <div class="fc-category">${q.category || 'รปป.'}</div>
    <div class="fc-front">${q.questionText}</div>
    <div class="fc-back">
      <div style="font-size:13px; color:var(--muted); text-transform:uppercase; font-weight:800;">เฉลย</div>
      ${backHtml}
    </div>
    <div class="fc-hint">แตะเพื่อดูเฉลย</div>
  `;
  
  // Events สำหรับพลิกไพ่ และ ลาก (Drag)
  el.addEventListener('mousedown', dragStart);
  el.addEventListener('touchstart', dragStart, {passive:false});
  
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('touchmove', dragMove, {passive:false});
  
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchend', dragEnd);

  stack.appendChild(el);
  currentCardEl = el;
}

// === Interaction Logic ===
function dragStart(e) {
  if(!currentCardEl) return;
  if(e.target.closest('.ctrl-btn')) return; // อย่าบังปุ่มด้านล่าง
  isDragging = true;
  currentCardEl.style.transition = 'none';
  startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
  startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
}

function dragMove(e) {
  if (!isDragging || !currentCardEl || !isFlipped) return; // ต้องพลิกก่อนถึงจะปัดได้
  e.preventDefault();
  currentX = (e.type.includes('mouse') ? e.clientX : e.touches[0].clientX) - startX;
  currentY = (e.type.includes('mouse') ? e.clientY : e.touches[0].clientY) - startY;
  
  const rotate = currentX * 0.1;
  currentCardEl.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;
  
  // สี Feedback ซ้าย/ขวา
  if (currentX > 50) currentCardEl.style.boxShadow = '20px 0 30px rgba(76,175,80,0.3)';
  else if (currentX < -50) currentCardEl.style.boxShadow = '-20px 0 30px rgba(255,82,82,0.3)';
  else currentCardEl.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
}

function dragEnd(e) {
  if (!isDragging || !currentCardEl) return;
  isDragging = false;
  
  // ถ้ายังไม่พลิก ให้ถือว่าเป็นการ Tap (คลิก) เพื่อพลิกดูเฉลย
  if (!isFlipped && Math.abs(currentX) < 10 && Math.abs(currentY) < 10) {
    isFlipped = true;
    currentCardEl.classList.add('flipped');
    document.getElementById('ctrl-hud').style.display = 'flex'; // แสดงปุ่มให้กดง่ายๆ ด้วย
    return;
  }
  
  if (!isFlipped) return;

  currentCardEl.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  
  if (currentX > 100) { handleSwipe('right'); } 
  else if (currentX < -100) { handleSwipe('left'); } 
  else {
    // กลับมาจุดเดิม
    currentCardEl.style.transform = 'translate(0px, 0px) rotate(0deg)';
    currentCardEl.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
  }
  currentX = 0; currentY = 0;
}

function handleSwipe(dir) {
  if(!currentCardEl) return;
  
  const offX = dir === 'right' ? window.innerWidth : -window.innerWidth;
  const rot  = dir === 'right' ? 30 : -30;
  
  currentCardEl.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
  currentCardEl.style.transform = `translate(${offX}px, 100px) rotate(${rot}deg)`;
  currentCardEl.style.opacity = '0';
  
  if (dir === 'right') {
    combo++;
    score += (10 + (combo * 2)); // โบนัส Combo
  } else {
    combo = 0;
  }
  
  currentCardEl = null;
  setTimeout(() => {
    currentIdx++;
    renderCard();
  }, 400);
}

function endGame() {
  document.getElementById('game-ui').classList.add('hidden');
  document.getElementById('end-ui').classList.remove('hidden');
  document.getElementById('end-score').textContent = score;
  
  if (score > 0) {
    callAPI('POST', { action: 'submit_flashcard_score', userId: userId, score: score });
  }
}

// === Leaderboard Logic ===
async function showLeaderboard() {
  document.getElementById('start-ui').classList.add('hidden');
  document.getElementById('lb-ui').classList.remove('hidden');
  loadLeaderboardData();
}

function showLeaderboardFromEnd() {
  document.getElementById('end-ui').classList.add('hidden');
  document.getElementById('lb-ui').classList.remove('hidden');
  loadLeaderboardData();
}

function closeLeaderboard() {
  document.getElementById('lb-ui').classList.add('hidden');
  document.getElementById('start-ui').classList.remove('hidden');
}

async function loadLeaderboardData() {
  document.getElementById('lb-loading').style.display = 'block';
  document.getElementById('lb-list').style.display = 'none';

  try {
    const res = await callAPI('GET', { action:'get_flashcard_leaderboard' });
    if (res.status === 'error') throw new Error(res.message);

    const list = document.getElementById('lb-list');
    list.innerHTML = '';
    
    if (res.leaderboard.length === 0) {
      list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--muted); font-size:13px;">ยังไม่มีผู้เข้าทดสอบทบทวน</div>';
    } else {
      res.leaderboard.forEach((e, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
        const isMe = e.userId === userId ? 'color:var(--secondary); font-weight:800;' : '';
        
        list.innerHTML += `
          <div class="lb-item">
            <div style="font-size:16px; font-weight:800; width:30px; color:var(--muted);">${medal}</div>
            <div style="flex:1; ${isMe}">
              <div>${e.fullName}</div>
              <div style="font-size:11px; color:var(--muted);">${e.rank} ${e.position}</div>
            </div>
            <div style="font-size:20px; font-weight:800; color:var(--success); font-family:'IBM Plex Mono';">${e.score}</div>
          </div>
        `;
      });
    }
    document.getElementById('lb-loading').style.display = 'none';
    list.style.display = 'block';
  } catch(e) {
    document.getElementById('lb-loading').textContent = '❌ โหลดข้อมูลล้มเหลว';
  }
}

// === API Helper ===
async function callAPI(method, params, timeoutMs=20000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL, opts = { signal:ctrl.signal, redirect:'follow' };
    if (method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts.method = 'GET'; } 
    else { opts.method  = 'POST'; opts.headers = { 'Content-Type':'text/plain' }; opts.body = JSON.stringify(params); }
    const resp = await fetch(url, opts);
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

init();
</script>
</body>
</html>
