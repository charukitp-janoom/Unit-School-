<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>แฟนพันธุ์แท้กำลังพล</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  /* Tactical Theme */
  --primary: #2e7d32; 
  --primary-dark: #1b5e20;
  --secondary: #ffca28;
  --bg: #0a0a0a; --surface: #121212; --surf2: #1e1e1e;
  --border: #333333; --text: #e0e0e0; --muted: #888888;
  --success: #4caf50; --danger: #ff5252; --info: #29b6f6;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

/* Grid Background */
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(46, 125, 50, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(46, 125, 50, 0.1) 1px, transparent 1px); background-size: 30px 30px; z-index: -1;}

.screen { display: flex; flex-direction: column; height: 100vh; width: 100%; position: absolute; inset: 0; transition: opacity 0.3s; padding: 20px;}
.hidden { display: none !important; opacity: 0; pointer-events: none; }

.btn { width: 100%; padding: 14px 16px; border-radius: 10px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
.btn-gold { background: var(--secondary); color: #000; box-shadow: 0 4px 15px rgba(255,202,40,0.2); }
.btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text); box-shadow: none;}
.btn:active { transform: scale(0.96); box-shadow: none;}

/* Loaders */
.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Custom Modal Alert */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-transform: uppercase;}
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-cancel { background: var(--surf2); border: 1px solid var(--border); color: var(--text); }
.ca-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(46,125,50,0.3); }
.ca-btn:active { transform: scale(0.96); }

/* Main Menu */
.panel-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px 24px; text-align: center; margin: auto; width: 100%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
.title { font-size: 28px; font-weight: 800; margin-bottom: 5px; color: var(--secondary); text-transform: uppercase;}
.subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

/* In-Game UI */
.top-hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.hud-level { font-size: 14px; font-weight: 800; color: var(--secondary); text-transform: uppercase; border: 1px solid var(--secondary); padding: 4px 10px; border-radius: 20px; background: rgba(255,202,40,0.1);}
.hud-prize { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 800; color: var(--text); }

/* Lifelines */
.lifelines { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.lifeline-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--surf2); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 15px rgba(46,125,50,0.2);}
.lifeline-btn:active { transform: scale(0.9); }
.lifeline-btn.used { opacity: 0.3; pointer-events: none; border-color: var(--border); filter: grayscale(100%); }

.q-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px; min-height: 120px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);}
.q-text { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.5; }

.choices-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.choice-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: left; display: flex; gap: 12px; align-items: center; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; color: var(--text); }
.c-label { color: var(--secondary); font-family: 'IBM Plex Mono'; font-weight: 800; }
.choice-btn:active { transform: scale(0.98); background: var(--surf2); }
.choice-btn.selected { background: rgba(255,202,40,0.15); border-color: var(--secondary); }
.choice-btn.correct { background: rgba(76,175,80,0.2); border-color: var(--success); color: var(--success); }
.choice-btn.wrong { background: rgba(255,82,82,0.15); border-color: var(--danger); color: var(--danger); }
.choice-btn.hidden-choice { visibility: hidden; opacity: 0; }

/* Leaderboard */
.lb-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; width: 100%; max-height: 60vh; overflow-y: auto; text-align: left; margin-bottom: 15px; }
.lb-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px dashed var(--border); }
.lb-item:last-child { border-bottom: none; }
.lb-rank { font-size: 16px; font-weight: 800; width: 30px; color: var(--muted); }
.lb-prize { font-size: 16px; font-weight: 800; color: var(--secondary); font-family: 'IBM Plex Mono'; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- Loading -->
<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="font-weight:700; color:var(--muted);">กำลังเชื่อมต่อศูนย์ข้อมูล...</div>
</div>

<!-- Custom Alert -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<!-- Start Screen -->
<div id="start-ui" class="screen hidden" style="justify-content:center;">
  <div class="panel-box">
    <div style="font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(255,202,40,0.5));">🚁</div>
    <div class="title">แฟนพันธุ์แท้</div>
    <div class="subtitle">ตอบคำถาม 15 ระดับ เพื่อชิงเหรียญ PX<br>คุณมี 3 ตัวช่วยในการทำภารกิจ</div>
    
    <button class="btn btn-primary" style="margin-bottom:12px;" onclick="startGame()">▶️ เริ่มปฏิบัติภารกิจ</button>
    <button class="btn btn-outline" style="margin-bottom:12px;" onclick="showLeaderboard()">🏆 ทำเนียบยอดฝีมือ</button>
    <button class="btn" style="background:transparent; border:none; color:var(--muted); font-size:14px;" onclick="liff.closeWindow()">กลับสู่เมนูหลัก</button>
  </div>
</div>

<!-- Game Screen -->
<div id="game-ui" class="screen hidden" style="padding-top: 30px;">
  <div class="top-hud">
    <div class="hud-level" id="g-level">ภารกิจที่ 1</div>
    <div class="hud-prize" id="g-prize">🪙 0</div>
  </div>

  <div class="lifelines">
    <div class="lifeline-btn" id="ll-50" onclick="use5050()">✂️</div>
    <div class="lifeline-btn" id="ll-phone" onclick="usePhone()">📻</div>
    <div class="lifeline-btn" id="ll-switch" onclick="useSwitch()">🔄</div>
  </div>

  <div class="q-box"><div class="q-text" id="q-text">กำลังโหลดภารกิจ...</div></div>

  <div class="choices-grid">
    <div class="choice-btn" id="c-A" onclick="selectAnswer('A')"><span class="c-label">A:</span><span id="t-A">-</span></div>
    <div class="choice-btn" id="c-B" onclick="selectAnswer('B')"><span class="c-label">B:</span><span id="t-B">-</span></div>
    <div class="choice-btn" id="c-C" onclick="selectAnswer('C')"><span class="c-label">C:</span><span id="t-C">-</span></div>
    <div class="choice-btn" id="c-D" onclick="selectAnswer('D')"><span class="c-label">D:</span><span id="t-D">-</span></div>
  </div>
  
  <button class="btn btn-danger" style="margin-top:auto;" onclick="confirmWalkAway()">🏳️ ขอยุติภารกิจ (รับรางวัลปัจจุบัน)</button>
</div>

<!-- End Screen -->
<div id="end-ui" class="screen hidden" style="justify-content:center;">
  <div class="panel-box">
    <div style="font-size: 60px; margin-bottom: 10px;" id="end-icon">🎯</div>
    <div class="title" style="color:var(--secondary);" id="end-title">จบภารกิจ!</div>
    <div class="subtitle" id="end-sub">คุณได้รับรางวัล</div>
    
    <div style="font-size:36px; font-weight:800; color:var(--success); font-family:'IBM Plex Mono'; margin-bottom:24px;" id="end-prize">🪙 0 PX</div>
    
    <button class="btn btn-primary" style="margin-bottom:12px;" onclick="resetGame()">🔄 เริ่มภารกิจใหม่</button>
    <button class="btn btn-outline" onclick="showLeaderboardFromEnd()">🏆 ดูทำเนียบ</button>
  </div>
</div>

<!-- Leaderboard Screen -->
<div id="lb-ui" class="screen hidden" style="justify-content:center;">
  <div class="panel-box" style="max-width:100%; padding:20px 15px; height:85vh; display:flex; flex-direction:column;">
    <div class="title" style="font-size:20px; margin-bottom:5px;">🏆 ทำเนียบยอดฝีมือ</div>
    <div class="subtitle" style="margin-bottom:15px;">จัดอันดับจากผลงานสูงสุด</div>
    
    <div id="lb-loading" style="color:var(--secondary); font-weight:700;">กำลังรวบรวมข้อมูล...</div>
    <div class="lb-container" id="lb-list" style="display:none;"></div>
    
    <button class="btn btn-outline" style="margin-top:auto;" onclick="closeLeaderboard()">← กลับสู่เมนูหลัก</button>
  </div>
</div>

<script>
const LIFF_ID = '2009717287-qTXoc8Mw';   // << LIFF ID ของเกมเศรษฐี
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

const PRIZES = ['0', '100', '200', '300', '500', '1,000', '2,000', '4,000', '8,000', '16,000', '32,000', '64,000', '125,000', '250,000', '500,000', '1,000,000'];

let userId = '';
let allQs = [];
let gameQs = [];
let currentLvl = 1;
let isAnswerLocked = false;
let guaranteedPrizeIndex = 0;

// Lifelines state
let used50 = false;
let usedPhone = false;
let usedSwitch = false;

function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `<button class="ca-btn ca-btn-confirm" onclick="closeCustomAlert()">รับทราบ</button>`;
  document.getElementById('custom-alert').classList.add('active');
}
function customConfirm(msg, callback, title="ยืนยันคำสั่ง", icon="❓", btnClass="ca-btn-confirm") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `
    <button class="ca-btn ca-btn-cancel" onclick="closeCustomAlert()">ยกเลิก</button>
    <button class="ca-btn ${btnClass}" id="btn-ca-ok">ยืนยัน</button>
  `;
  document.getElementById('btn-ca-ok').onclick = () => { closeCustomAlert(); callback(); };
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.remove('active'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    userId = (await liff.getProfile()).userId;
    const data = await callAPI('GET', { action:'get_questions', userId: userId });
    
    if (data.status === 'error') throw new Error(data.message);
    allQs = data.questions || [];
    if (allQs.length < 15) throw new Error(`ข้อสอบในระบบมีไม่พอ (มี ${allQs.length} ข้อ / ต้องการ 15 ข้อ)`);

    document.getElementById('ov-load').classList.add('hidden');
    showScreen('start-ui');
  } catch(e) {
    document.getElementById('ov-load').innerHTML = `<div style="font-size:50px;">⚠️</div><p style="color:var(--danger); margin-top:10px;">${e.message}</p>`;
  }
}

function resetGame() {
  currentLvl = 1;
  guaranteedPrizeIndex = 0;
  used50 = false; usedPhone = false; usedSwitch = false;
  
  document.getElementById('ll-50').classList.remove('used');
  document.getElementById('ll-phone').classList.remove('used');
  document.getElementById('ll-switch').classList.remove('used');
  
  showScreen('start-ui');
}

function startGame() {
  gameQs = [...allQs].sort(() => Math.random() - 0.5).slice(0, 15);
  showScreen('game-ui');
  loadQuestion();
}

function loadQuestion() {
  isAnswerLocked = false;
  const q = gameQs[currentLvl - 1];
  
  document.getElementById('g-level').textContent = `ภารกิจที่ ${currentLvl} / 15`;
  document.getElementById('g-prize').textContent = `🪙 ${PRIZES[currentLvl]}`;
  document.getElementById('q-text').textContent = q.questionText;
  
  ['A','B','C','D'].forEach(k => {
    const btn = document.getElementById(`c-${k}`);
    btn.className = 'choice-btn';
    btn.style.display = 'flex';
    document.getElementById(`t-${k}`).textContent = q.choices[k] || '';
  });
}

function selectAnswer(ans) {
  if (isAnswerLocked) return;
  isAnswerLocked = true;
  
  const q = gameQs[currentLvl - 1];
  const btn = document.getElementById(`c-${ans}`);
  btn.classList.add('selected');
  
  setTimeout(() => {
    if (ans === q.correctAnswer) {
      btn.classList.replace('selected', 'correct');
      setTimeout(() => { handleCorrect(); }, 1200);
    } else {
      btn.classList.replace('selected', 'wrong');
      document.getElementById(`c-${q.correctAnswer}`).classList.add('correct');
      setTimeout(() => { handleWrong(); }, 2000);
    }
  }, 1500);
}

function handleCorrect() {
  if (currentLvl === 5) guaranteedPrizeIndex = 5;
  if (currentLvl === 10) guaranteedPrizeIndex = 10;
  
  if (currentLvl === 15) {
    endGame(15, "สุดยอด! ภารกิจสมบูรณ์", "🏆");
  } else {
    currentLvl++;
    loadQuestion();
  }
}

function handleWrong() {
  endGame(guaranteedPrizeIndex, "ภารกิจล้มเหลว!", "💀");
}

function confirmWalkAway() {
  if (isAnswerLocked) return;
  customConfirm(`ยืนยันขอยุติภารกิจ?<br><span style="color:var(--muted)">คุณจะได้รับรางวัลในระดับที่ผ่านมาแล้ว</span>`, () => {
    endGame(currentLvl - 1, "ยุติภารกิจสำเร็จ", "🏳️");
  }, 'ขอยุติภารกิจ', '⚠️');
}

function endGame(prizeIndex, title, icon) {
  showScreen('end-ui');
  document.getElementById('end-icon').textContent = icon;
  document.getElementById('end-title').textContent = title;
  
  const prizeText = PRIZES[prizeIndex];
  document.getElementById('end-prize').textContent = `🪙 ${prizeText} PX`;
  
  if (prizeIndex > 0) {
    callAPI('POST', { action: 'submit_game_score', userId: userId, prizeIndex: prizeIndex, prizeText: prizeText });
  }
}

// === Lifelines ===
function use5050() {
  if (used50 || isAnswerLocked) return;
  customConfirm("ขออนุญาตตัด 2 ตัวเลือกที่ผิดทิ้ง?", () => {
    used50 = true;
    document.getElementById('ll-50').classList.add('used');
    const q = gameQs[currentLvl - 1];
    let wrongKeys = ['A','B','C','D'].filter(k => k !== q.correctAnswer);
    wrongKeys = wrongKeys.sort(() => Math.random() - 0.5).slice(0, 2);
    wrongKeys.forEach(k => { document.getElementById(`c-${k}`).classList.add('hidden-choice'); });
  }, 'ตัวช่วย 50:50', '✂️');
}

function usePhone() {
  if (usedPhone || isAnswerLocked) return;
  customConfirm("ขออนุญาตวิทยุสอบถามศูนย์บัญชาการ?", () => {
    usedPhone = true;
    document.getElementById('ll-phone').classList.add('used');
    
    document.getElementById('ov-load').classList.remove('hidden');
    document.querySelector('.spinner').style.display = 'none';
    document.querySelector('#ov-load div:last-child').textContent = '📻 กำลังเชื่อมต่อวิทยุสื่อสาร...';
    
    setTimeout(() => {
      document.getElementById('ov-load').classList.add('hidden');
      document.querySelector('.spinner').style.display = 'block';
      const q = gameQs[currentLvl - 1];
      const isCorrect = Math.random() > 0.15; // โอกาสถูก 85%
      let ans = q.correctAnswer;
      if (!isCorrect) {
        let wrongKeys = ['A','B','C','D'].filter(k => k !== q.correctAnswer && !document.getElementById(`c-${k}`).classList.contains('hidden-choice'));
        if (wrongKeys.length > 0) ans = wrongKeys[Math.floor(Math.random() * wrongKeys.length)];
      }
      customAlert(`ศปก. แจ้งว่า:<br><br><b style="color:var(--secondary); font-size:16px;">"น่าจะเป็นข้อ ${ans} นะ แต่ผมก็ไม่ค่อยแน่ใจ"</b>`, 'วิทยุสื่อสาร', '📻');
    }, 2000);
  }, 'ขอความช่วยเหลือ', '📻');
}

function useSwitch() {
  if (usedSwitch || isAnswerLocked) return;
  customConfirm("ขอเปลี่ยนคำสั่งภารกิจ (เปลี่ยนคำถาม)?", () => {
    usedSwitch = true;
    document.getElementById('ll-switch').classList.add('used');
    const newQ = allQs.filter(q => !gameQs.includes(q)).sort(() => Math.random() - 0.5)[0];
    if (newQ) {
      gameQs[currentLvl - 1] = newQ;
      loadQuestion();
    } else {
      customAlert("คลังข้อสอบไม่มีข้อเหลือแล้ว!", "ล้มเหลว", "❌");
    }
  }, 'เปลี่ยนคำถาม', '🔄');
}

// === Leaderboard ===
async function showLeaderboard() {
  showScreen('lb-ui');
  loadLeaderboardData();
}

function showLeaderboardFromEnd() {
  showScreen('lb-ui');
  loadLeaderboardData();
}

function closeLeaderboard() {
  showScreen('start-ui');
}

async function loadLeaderboardData() {
  document.getElementById('lb-loading').style.display = 'block';
  document.getElementById('lb-list').style.display = 'none';

  try {
    const res = await callAPI('GET', { action:'get_game_leaderboard' });
    if (res.status === 'error') throw new Error(res.message);

    const list = document.getElementById('lb-list');
    list.innerHTML = '';
    
    if (res.leaderboard.length === 0) {
      list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--muted); font-size:13px;">ยังไม่มีผู้ปฏิบัติภารกิจ</div>';
    } else {
      res.leaderboard.forEach((e, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
        const isMe = e.userId === userId ? 'color:var(--secondary); font-weight:800;' : '';
        
        list.innerHTML += `
          <div class="lb-item">
            <div class="lb-rank">${medal}</div>
            <div style="flex:1;">
              <div style="${isMe}">${e.fullName}</div>
              <div style="font-size:11px; color:var(--muted);">${e.rank} ${e.position}</div>
            </div>
            <div class="lb-prize">🪙 ${e.prizeText}</div>
          </div>
        `;
      });
    }
    document.getElementById('lb-loading').style.display = 'none';
    list.style.display = 'block';
  } catch(e) {
    document.getElementById('lb-loading').innerHTML = '<span style="color:var(--danger)">❌ โหลดข้อมูลล้มเหลว</span>';
  }
}

// === API Helper ===
async function callAPI(method, params, timeoutMs=30000) {
  const ctrl = new AbortController(); const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL, opts = { signal:ctrl.signal, redirect:'follow' };
    if (method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts.method = 'GET'; } 
    else { opts.method  = 'POST'; opts.headers = { 'Content-Type':'text/plain' }; opts.body = JSON.stringify(params); }
    const resp = await fetch(url, opts); clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status); return await resp.json();
  } catch(e) { clearTimeout(tid); throw e; }
}
