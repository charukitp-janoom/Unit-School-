<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Quiz - Command Center (Host)</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Tactical Theme */
  --bg: #050a05;
  --surface: #0a140a;
  --border: #1b5e20;
  --primary: #2e7d32;
  --secondary: #ffca28;
  --text: #e0e0e0;
  
  /* Combat Colors */
  --shape-red: #d32f2f;
  --shape-blue: #1976d2;
  --shape-yellow: #fbc02d;
  --shape-green: #388e3c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

/* Radar / Terminal Effects */
.scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); background-size: 100% 4px; z-index: 900; pointer-events: none;}
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(46, 125, 50, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(46, 125, 50, 0.15) 1px, transparent 1px); background-size: 40px 40px; z-index: -1;}

.hidden { display: none !important; }
.btn { padding: 14px 28px; border: none; border-radius: 8px; font-size: 20px; font-weight: 800; cursor: pointer; font-family: 'Sarabun'; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-transform: uppercase;}
.btn-primary { background: linear-gradient(135deg, var(--primary), #1b5e20); color: #fff; border: 1px solid #4caf50;}
.btn-primary:active { transform: scale(0.98); }
.btn-gold { background: var(--secondary); color: #000; border: 1px solid #ffb300;}

/* Layout */
.screen { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; position: absolute; inset: 0; z-index: 10;}
.top-bar { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,20,10,0.9); border-bottom: 1px solid var(--border); backdrop-filter: blur(5px);}
.pin-display { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 700; color: var(--secondary); letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,202,40,0.5);}
.player-count { font-size: 24px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 10px;}

/* Setup Screen */
.setup-box { margin: auto; background: var(--surface); padding: 40px; border-radius: 16px; border: 2px solid var(--border); text-align: center; width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(46,125,50,0.3);}
.setup-title { font-size: 32px; font-weight: 800; color: var(--secondary); margin-bottom: 20px; text-transform: uppercase;}
.form-control { width: 100%; padding: 16px; font-size: 18px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 20px; text-align: center; font-family: 'Sarabun';}
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(46,125,50,0.5);}

/* Lobby Screen */
.lobby-main { flex: 1; display: flex; flex-direction: column; padding: 40px; text-align: center; align-items: center;}
.join-instruction { font-size: 36px; font-weight: 800; margin-bottom: 40px; color: #fff;}
.players-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 1000px; margin-bottom: 40px;}
.player-tag { background: rgba(46,125,50,0.2); padding: 10px 20px; border-radius: 30px; font-size: 22px; font-weight: 700; color: var(--text); border: 1px solid var(--border); animation: popIn 0.3s ease-out;}
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* Question Screen */
.q-container { flex: 1; display: flex; flex-direction: column; padding: 30px 40px; }
.q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.timer { font-family: 'IBM Plex Mono', monospace; font-size: 60px; font-weight: 700; background: var(--surface); width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--primary); color: #fff; box-shadow: 0 0 20px rgba(46,125,50,0.5);}
.q-text-box { flex: 1; background: var(--surface); border: 2px solid var(--border); border-radius: 16px; padding: 30px; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
.q-text { font-size: 42px; font-weight: 800; line-height: 1.4; color: #fff;}

.answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
.ans-box { border-radius: 12px; padding: 25px 30px; display: flex; align-items: center; gap: 20px; font-size: 32px; font-weight: 700; color: #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;}
.ans-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.9); flex-shrink: 0; }

.s-red { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
.s-blue { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
.s-yellow { border-radius: 50%; }
.s-green { border-radius: 8px; }

.ans-red { background: var(--shape-red); }
.ans-blue { background: var(--shape-blue); }
.ans-yellow { background: var(--shape-yellow); }
.ans-green { background: var(--shape-green); }

/* Reveal States */
.ans-box.dimmed { opacity: 0.3; filter: grayscale(80%); }
.ans-box.correct { border: 4px solid #fff; box-shadow: 0 0 30px rgba(255,255,255,0.6); animation: pulse-border 1s infinite; }
@keyframes pulse-border { 0%, 100% { border-color: rgba(255,255,255,1); } 50% { border-color: rgba(255,255,255,0.2); } }

/* Podium / Scoreboard */
.podium-container { flex: 1; display: flex; flex-direction: column; padding: 40px; align-items: center; }
.podium-title { font-size: 48px; font-weight: 800; color: var(--secondary); margin-bottom: 40px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,202,40,0.3);}
.podium-wrap { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 400px; width: 100%; max-width: 800px;}
.podium-place { display: flex; flex-direction: column; align-items: center; width: 30%; position: relative;}
.p-name { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 10px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.p-score { font-family: 'IBM Plex Mono'; font-size: 24px; font-weight: 700; color: var(--secondary); margin-bottom: 15px; }
.p-block { width: 100%; background: linear-gradient(180deg, var(--primary), var(--surface)); border: 2px solid var(--border); border-bottom: none; border-radius: 12px 12px 0 0; display: flex; justify-content: center; font-size: 60px; font-weight: 800; color: rgba(255,255,255,0.5); padding-top: 20px; box-shadow: inset 0 10px 30px rgba(0,0,0,0.5);}

.p-1 .p-block { height: 250px; background: linear-gradient(180deg, #ffca28, #b08d00); border-color: #ffe082; color: #fff;}
.p-2 .p-block { height: 180px; }
.p-3 .p-block { height: 120px; }

/* Custom Modal Alert */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 50px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-transform: uppercase;}
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.ca-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(46,125,50,0.3); }
.ca-btn-danger { background: #d32f2f; color: #fff; box-shadow: 0 4px 15px rgba(211,47,47,0.3); }
.ca-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="scanlines"></div>

<!-- Custom Alert -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<div id="screen-setup" class="screen" style="justify-content: center;">
  <div class="setup-box">
    <div style="font-size:60px; margin-bottom:10px;">📡</div>
    <div class="setup-title">ศูนย์ควบคุมการสอบสด</div>
    <input type="password" id="inp-secret" class="form-control" placeholder="รหัสผ่านศูนย์บัญชาการ">
    <select id="inp-subject" class="form-control" style="text-align:center;">
      <option value="">กำลังโหลดหลักสูตร...</option>
    </select>
    <button class="btn btn-primary" style="width:100%;" id="btn-start" onclick="initRoom()">เริ่มกระจายสัญญาณ</button>
  </div>
</div>

<!-- TOP BAR (Shared for Lobby, Question, Scoreboard) -->
<div id="top-bar" class="top-bar hidden">
  <div class="pin-display">FREQ: <span id="room-pin">OPEN</span></div>
  <div class="player-count">🪖 กำลังพล: <span id="p-count">0</span></div>
  <button class="btn btn-primary" id="btn-next-step" style="padding:10px 20px; font-size:18px;" onclick="handleNextStep()">เริ่มปฏิบัติการ</button>
</div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen hidden" style="padding-top: 80px;">
  <div class="lobby-main">
    <div class="join-instruction">กำลังพลที่พร้อมรับคำสั่ง...</div>
    <div class="players-grid" id="players-grid"></div>
  </div>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen hidden" style="padding-top: 80px;">
  <div class="q-container">
    <div class="q-header">
      <div style="font-size:24px; font-weight:800; color:var(--secondary);" id="q-number">คำสั่งที่ 1 / 10</div>
      <div class="timer" id="q-timer">20</div>
    </div>
    
    <div class="q-text-box">
      <div class="q-text" id="q-text">กำลังประมวลผลคำสั่ง...</div>
    </div>
    
    <div class="answers-grid">
      <div class="ans-box ans-red" id="ans-0"><div class="ans-icon s-red"></div><div id="ans-text-0">-</div></div>
      <div class="ans-box ans-blue" id="ans-1"><div class="ans-icon s-blue"></div><div id="ans-text-1">-</div></div>
      <div class="ans-box ans-yellow" id="ans-2"><div class="ans-icon s-yellow"></div><div id="ans-text-2">-</div></div>
      <div class="ans-box ans-green" id="ans-3"><div class="ans-icon s-green"></div><div id="ans-text-3">-</div></div>
    </div>
  </div>
</div>

<!-- PODIUM -->
<div id="screen-podium" class="screen hidden" style="padding-top: 80px;">
  <div class="podium-container">
    <div class="podium-title">รายงานสรุปผลการปฏิบัติการ</div>
    <div class="podium-wrap" id="podium-wrap">
      <!-- Generated via JS -->
    </div>
  </div>
</div>

<script>
const LIFF_ID = '2009717287-DofMgtKC';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let adminSecret = '';
let currentState = null;
let pollInterval = null;
let countdownInterval = null;
let timeLeft = 0;
let currentPlayers = [];

// === Custom Alert Functions ===
function showModal(icon, title, msg, isConfirm = false, onConfirm = null) {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  
  if (isConfirm) {
    document.getElementById('ca-btn-group').innerHTML = `
      <button class="ca-btn ca-btn-cancel" onclick="document.getElementById('custom-alert').classList.remove('active')">ยกเลิก</button>
      <button class="ca-btn ca-btn-danger" id="ca-ok-btn">ยืนยัน</button>
    `;
    document.getElementById('ca-ok-btn').onclick = () => {
      document.getElementById('custom-alert').classList.remove('active');
      if (onConfirm) onConfirm();
    };
  } else {
    document.getElementById('ca-btn-group').innerHTML = `
      <button class="ca-btn ca-btn-confirm" onclick="document.getElementById('custom-alert').classList.remove('active')">รับทราบ</button>
    `;
  }
  document.getElementById('custom-alert').classList.add('active');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    const res = await callAPI('GET', { action: 'get_subjects', userId: 'HOST' });
    if(res.status === 'ok') {
      const sel = document.getElementById('inp-subject');
      sel.innerHTML = '<option value="">-- เลือกหลักสูตรเพื่อกระจายสัญญาณ --</option>';
      res.subjects.forEach(s => {
        sel.innerHTML += `<option value="${s.name}">${s.name} (${s.count} ข้อ)</option>`;
      });
    }
  } catch(e) {
    showModal('⚠️', 'เชื่อมต่อล้มเหลว', e.message);
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  if(id !== 'screen-setup') document.getElementById('top-bar').classList.remove('hidden');
  else document.getElementById('top-bar').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

async function initRoom() {
  adminSecret = document.getElementById('inp-secret').value;
  const subj = document.getElementById('inp-subject').value;
  if(!adminSecret || !subj) return showModal('⚠️', 'แจ้งเตือน', 'กรุณาระบุรหัสผ่านและเลือกหลักสูตร');
  
  const btn = document.getElementById('btn-start');
  btn.textContent = 'กำลังสร้างช่องสัญญาณ...';
  btn.disabled = true;
  
  try {
    const res = await callAPI('POST', { action: 'live_host_action', secret: adminSecret, command: 'START', subject: subj });
    if(res.status === 'ok') {
      currentState = res.state;
      document.getElementById('room-pin').textContent = subj.substring(0, 8).toUpperCase() + '...';
      document.getElementById('btn-next-step').textContent = 'เริ่มปฏิบัติการ';
      showScreen('screen-lobby');
      startPolling();
    } else {
      showModal('❌', 'ข้อผิดพลาด', res.message);
    }
  } catch(e) {
    showModal('📡', 'สัญญาณขาดหาย', 'ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่');
  } finally {
    btn.textContent = 'เริ่มกระจายสัญญาณ';
    btn.disabled = false;
  }
}

function startPolling() {
  clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const res = await callAPI('GET', { action: 'live_get_state', isHost: 'true' });
      if(res.status === 'ok') {
        updateUI(res.state, res.participants, res.answers);
      }
    } catch(e) {}
  }, 1500); // Host poll ไวได้เพราะใช้คอมพิวเตอร์
}

function updateUI(state, participants, answers) {
  currentState = state;
  currentPlayers = participants || [];
  
  document.getElementById('p-count').textContent = currentPlayers.length;
  
  if(state.status === 'LOBBY') {
    const grid = document.getElementById('players-grid');
    grid.innerHTML = '';
    currentPlayers.forEach(p => {
      grid.innerHTML += `<div class="player-tag">${p.fullName}</div>`;
    });
  } 
  else if (state.status === 'QUESTION' || state.status === 'REVEAL') {
    // นับคนตอบ
    const currentAns = answers.filter(a => a.qIndex === state.currentQIndex);
    if(state.status === 'QUESTION' && currentAns.length >= currentPlayers.length && currentPlayers.length > 0) {
       // ทุกคนตอบครบแล้ว ข้ามไปเฉลย
       if(timeLeft > 2) timeLeft = 2; // ย่นเวลา
    }
  }
}

async function nextState(newStatus) {
  let nextQIndex = currentState.currentQIndex;
  if(newStatus === 'QUESTION' && currentState.status === 'SCOREBOARD') {
    nextQIndex++;
  }
  
  document.getElementById('btn-next-step').disabled = true;
  document.getElementById('btn-next-step').textContent = 'กำลังประมวลผล...';
  
  try {
    const res = await callAPI('POST', { action: 'live_host_action', secret: adminSecret, command: 'UPDATE', status: newStatus, qIndex: nextQIndex });
    if(res.status === 'ok') {
       currentState = res.state;
       renderState();
    }
  } catch(e) {
    showModal('⚠️', 'ข้อผิดพลาด', 'ส่งคำสั่งไม่สำเร็จ');
  } finally {
    document.getElementById('btn-next-step').disabled = false;
  }
}

function renderState() {
  clearInterval(countdownInterval);
  
  if(currentState.status === 'QUESTION') {
    showScreen('screen-question');
    document.getElementById('btn-next-step').textContent = 'ข้ามไปเฉลย';
    
    const q = currentState.questions[currentState.currentQIndex];
    document.getElementById('q-number').textContent = `คำสั่งที่ ${currentState.currentQIndex + 1} / ${currentState.questions.length}`;
    document.getElementById('q-text').textContent = q.questionText;
    
    // เคลียร์ UI
    for(let i=0; i<4; i++) {
       const box = document.getElementById(`ans-${i}`);
       box.className = `ans-box ans-${['red','blue','yellow','green'][i]}`;
       document.getElementById(`ans-text-${i}`).textContent = '-';
       box.style.display = 'flex';
    }
    
    // ใส่ตัวเลือกที่สุ่มมา
    q.shuffledKeys.forEach((key, i) => {
       document.getElementById(`ans-text-${i}`).textContent = q.choices[key] || '';
    });
    for(let i=q.shuffledKeys.length; i<4; i++) {
       document.getElementById(`ans-${i}`).style.display = 'none';
    }
    
    timeLeft = 20;
    document.getElementById('q-timer').textContent = timeLeft;
    countdownInterval = setInterval(() => {
       timeLeft--;
       document.getElementById('q-timer').textContent = timeLeft;
       if(timeLeft <= 0) {
         clearInterval(countdownInterval);
         nextState('REVEAL');
       }
    }, 1000);
  }
  else if(currentState.status === 'REVEAL') {
    const q = currentState.questions[currentState.currentQIndex];
    const correctIdx = q.shuffledKeys.indexOf(q.correctAnswer);
    
    for(let i=0; i<4; i++) {
       const box = document.getElementById(`ans-${i}`);
       if(i === correctIdx) box.classList.add('correct');
       else box.classList.add('dimmed');
    }
    
    document.getElementById('btn-next-step').textContent = 'สรุปคะแนน';
  }
  else if(currentState.status === 'SCOREBOARD') {
    showScreen('screen-podium');
    renderPodium();
  }
}

async function renderPodium() {
  const res = await callAPI('GET', { action: 'live_get_state', isHost: 'true' });
  if(res.status === 'ok') {
    const scores = {};
    (res.answers || []).forEach(a => {
       if(!scores[a.userId]) scores[a.userId] = { name: a.fullName, score: 0 };
       scores[a.userId].score += a.score;
    });
    
    const sorted = Object.values(scores).sort((a,b) => b.score - a.score);
    const top3 = [sorted[1], sorted[0], sorted[2]]; // เรียง 2, 1, 3 สำหรับ Podium
    
    let html = '';
    top3.forEach((p, idx) => {
       if(p) {
          html += `
            <div class="podium-place p-${idx+1}">
              <div class="p-name">${p.name}</div>
              <div class="p-score">${p.score}</div>
              <div class="p-block">${idx === 0 ? 2 : idx === 1 ? 1 : 3}</div>
            </div>
          `;
       } else {
          html += `<div class="podium-place p-${idx+1}"></div>`;
       }
    });
    document.getElementById('podium-wrap').innerHTML = html;
    
    const isLast = currentState.currentQIndex >= currentState.questions.length - 1;
    document.getElementById('btn-next-step').textContent = isLast ? 'ยุติปฏิบัติการ' : 'คำสั่งถัดไป';
  }
}

function handleNextStep() {
  if(currentState.status === 'QUESTION') nextState('REVEAL');
  else if(currentState.status === 'REVEAL') nextState('SCOREBOARD');
  else if(currentState.status === 'SCOREBOARD') {
    if(currentState.currentQIndex >= currentState.questions.length - 1) closeRoom();
    else nextState('QUESTION');
  }
  else if(currentState.status === 'LOBBY') {
    nextState('QUESTION');
  }
}

function closeRoom() {
  showModal('🚪', 'ยืนยันปิดศูนย์บัญชาการ', 'ยืนยันการยุติปฏิบัติการสอบสดในครั้งนี้ใช่หรือไม่?', true, async () => {
    clearInterval(pollInterval);
    clearInterval(countdownInterval);
    await callAPI('POST', { action:'live_host_action', secret:adminSecret, command:'END' });
    showScreen('screen-setup');
  });
}

async function callAPI(method, params) {
  let url = GAS_URL, opts = { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(params) };
  if(method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts = {method:'GET'}; }
  const resp = await fetch(url, opts);
  return await resp.json();
}

init();
