<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Quiz - Host</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:      #46178f;
  --secondary:    #ffd700;
  --bg:           #f2f2f2;
  --panel:        #ffffff;
  --text:         #333333;
  --shape-red:    #e21b3c;
  --shape-blue:   #1368ce;
  --shape-yellow: #d89e00;
  --shape-green:  #26890c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100dvh; display:flex; flex-direction:column; }

.hidden { display:none !important; }

/* ── Buttons ── */
.btn { padding:14px 28px; border:none; border-radius:8px; font-size:22px; font-weight:800; cursor:pointer; font-family:'Sarabun'; transition:transform 0.1s, box-shadow 0.1s; box-shadow:0 4px 0 rgba(0,0,0,0.2); }
.btn:active   { transform:translateY(4px); box-shadow:none; }
.btn:disabled { opacity:0.55; cursor:not-allowed; transform:none; }
.btn-primary  { background:var(--primary); color:#fff; }
.btn-danger   { background:#e21b3c; color:#fff; }

/* ── Screen base ── */
.screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; position:absolute; inset:0; background:var(--bg); z-index:10; }

/* ── Login / Setup boxes ── */
.setup-box { background:var(--panel); padding:40px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.12); text-align:center; width:min(400px, 90vw); }
.setup-box h2 { margin-bottom:14px; font-size:24px; }
input, select {
  width:100%; padding:14px; margin:10px 0 18px;
  font-size:18px; border-radius:8px; border:2px solid #ddd;
  text-align:center; font-family:inherit; color:var(--text); background:#fff;
  transition:border-color 0.2s; outline:none;
}
input:focus, select:focus { border-color:var(--primary); }
select { cursor:pointer; appearance:none;
  background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat:no-repeat; background-position:right 1rem center; background-size:1em; padding-right:40px;
}
/* [NEW] แสดง/ซ่อน password */
.pw-wrap { position:relative; }
.pw-wrap input { padding-right:50px; }
.pw-eye { position:absolute; right:14px; top:50%; transform:translateY(-60%); cursor:pointer; font-size:20px; background:none; border:none; color:#999; }

/* ── Lobby ── */
.lobby-screen { background:var(--primary); color:#fff; }
.join-info     { font-size:40px; font-weight:800; margin-bottom:14px; text-align:center; }
.join-pin      { font-size:68px; font-weight:800; font-family:monospace; background:#fff; color:#000; padding:8px 36px; border-radius:14px; display:inline-block; margin-bottom:32px; }
.player-count  { font-size:22px; font-weight:800; color:var(--secondary); margin-bottom:18px; background:rgba(0,0,0,0.3); padding:10px 28px; border-radius:30px; display:inline-block; }
.player-list   { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:900px; margin:0 auto 24px; max-height:200px; overflow-y:auto; padding:8px; }
.player-list::-webkit-scrollbar { display:none; }
.player-pill   { background:rgba(255,255,255,0.2); padding:7px 18px 7px 10px; border-radius:30px; font-weight:700; font-size:17px; animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); display:flex; align-items:center; gap:8px; }
.player-pill img { width:30px; height:30px; border-radius:50%; object-fit:cover; background:#fff; border:2px solid #fff; }
@keyframes popIn { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }

/* ── Game (Question) screen ── */
.q-container { width:90%; max-width:1200px; margin:0 auto; height:100%; display:flex; flex-direction:column; padding:32px 0; }
.q-header    { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.q-counter   { font-size:18px; font-weight:800; color:#666; background:#eee; padding:6px 16px; border-radius:20px; }
.q-title     { font-size:42px; font-weight:800; text-align:center; background:#fff; padding:28px; border-radius:14px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:32px; line-height:1.3; }
.q-layout    { display:flex; flex:1; gap:36px; }
.q-media     { flex:1; display:flex; align-items:center; justify-content:center; }
.q-timer-circle { width:140px; height:140px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:60px; font-weight:800; color:#fff; font-family:monospace; box-shadow:inset 0 0 20px rgba(0,0,0,0.3); transition:background 0.5s; }
.q-timer-circle.danger { background:#e21b3c; }
.ans-count  { font-size:28px; font-weight:800; margin-top:18px; text-align:center; }

/* ── Answer boxes ── */
.answers-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:auto; }
.ans-box      { display:flex; align-items:center; padding:14px 22px; border-radius:12px; color:#fff; font-size:20px; font-weight:800; box-shadow:0 4px 0 rgba(0,0,0,0.2); transition:opacity 0.3s; min-height:90px; word-break:break-word; }
.ans-box .shape { width:34px; height:34px; background:#fff; margin-right:14px; flex-shrink:0; }
.shape-red    { clip-path:polygon(50% 0%,0% 100%,100% 100%); }
.shape-blue   { clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }
.shape-yellow { border-radius:50%; }
.shape-green  { border-radius:8px; }
.dimmed       { opacity:0.28; }
.correct-box  { outline:4px solid #fff; outline-offset:2px; }
.bg-red       { background-color:var(--shape-red)    !important; }
.bg-blue      { background-color:var(--shape-blue)   !important; }
.bg-yellow    { background-color:var(--shape-yellow) !important; }
.bg-green     { background-color:var(--shape-green)  !important; }

/* ── Answer bar chart ── */
.chart-container { display:flex; align-items:flex-end; justify-content:center; gap:36px; height:220px; margin-top:32px; width:100%; }
.bar-wrap  { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; width:110px; }
.bar       { width:100%; background:#ccc; transition:height 0.5s ease; border-top-left-radius:8px; border-top-right-radius:8px; min-height:4px; }
.bar-count { font-size:26px; font-weight:800; margin-bottom:8px; }

/* ── Scoreboard ── */
.sb-screen  { background:var(--primary); color:#fff; justify-content:flex-start; padding:48px 20px 0; overflow-y:auto; }
.sb-screen h1 { text-align:center; font-size:56px; margin-bottom:32px; text-shadow:0 4px 10px rgba(0,0,0,0.3); flex-shrink:0; }
.podium     { display:flex; align-items:flex-end; justify-content:center; gap:20px; width:100%; max-width:800px; }
.podium-place { display:flex; flex-direction:column; align-items:center; flex:1; max-width:220px; }
.pod-avatar-wrap { position:relative; z-index:10; display:flex; justify-content:center; margin-bottom:-45px; }
.p-1 .pod-avatar-wrap { margin-bottom:-65px; }
.pod-avatar  { width:90px; height:90px; border-radius:50%; object-fit:cover; border:5px solid var(--primary); background:#fff; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
.p-1 .pod-avatar { width:130px; height:130px; border-color:#ffd700; }
.p-2 .pod-avatar { border-color:#c0c0c0; }
.p-3 .pod-avatar { border-color:#cd7f32; }
.p-name  { font-size:20px; font-weight:800; color:#fff; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:rgba(255,255,255,0.15); padding:55px 12px 14px; border-radius:12px; width:100%; margin-bottom:14px; position:relative; z-index:1; box-shadow:0 4px 10px rgba(0,0,0,0.1); border:1px solid rgba(255,255,255,0.1); }
.p-1 .p-name { padding-top:75px; font-size:24px; background:rgba(255,215,0,0.2); border-color:rgba(255,215,0,0.5); color:#ffd700; }
.p-score { font-size:20px; font-family:monospace; margin-bottom:14px; font-weight:800; color:var(--secondary); text-shadow:0 2px 4px rgba(0,0,0,0.5); }
.p-block { width:100%; background:rgba(0,0,0,0.2); border-top-left-radius:14px; border-top-right-radius:14px; display:flex; align-items:flex-start; justify-content:center; padding-top:18px; font-size:56px; font-weight:800; color:rgba(255,255,255,0.45); }
.p-1 .p-block { height:35vh; min-height:190px; background:#ffd700; color:#b8860b; box-shadow:0 0 30px rgba(255,215,0,0.5); }
.p-2 .p-block { height:25vh; min-height:130px; background:#c0c0c0; color:#808080; }
.p-3 .p-block { height:18vh; min-height:90px;  background:#cd7f32; color:#8b4513; }

/* ── Top controls ── */
.top-controls { position:fixed; top:16px; right:16px; z-index:100; display:flex; gap:10px; }

/* ── Connection warning ── */
.conn-warn { position:fixed; top:0; left:0; right:0; background:rgba(255,50,50,0.92); color:#fff; font-size:14px; font-weight:800; text-align:center; padding:7px; z-index:200; transform:translateY(-100%); transition:transform 0.3s; }
.conn-warn.show { transform:translateY(0); }

/* ── Custom Modal ── */
.modal-ov  { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s; backdrop-filter:blur(2px); }
.modal-ov.active { opacity:1; pointer-events:auto; }
.modal-box { background:var(--panel); border-radius:24px; padding:32px 24px; width:100%; max-width:380px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.5); transform:scale(0.9); transition:transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275); }
.modal-ov.active .modal-box { transform:scale(1); }
.modal-icon  { font-size:70px; margin-bottom:10px; line-height:1; }
.modal-title { font-size:24px; font-weight:800; color:var(--text); margin-bottom:10px; }
.modal-msg   { font-size:17px; color:#666; margin-bottom:28px; line-height:1.6; }
.modal-btn-group { display:flex; gap:12px; justify-content:center; }
.modal-btn         { flex:1; padding:14px 0; border-radius:12px; font-size:19px; font-weight:800; font-family:'Sarabun'; cursor:pointer; transition:transform 0.1s; border:none; }
.modal-btn-cancel  { background:#f2f2f2; color:#666; }
.modal-btn-confirm { background:var(--primary); color:#fff; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
.modal-btn:active  { transform:scale(0.96); }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="ov-load" class="screen" style="z-index:9999;background:#fff;">
  <div style="font-size:40px;margin-bottom:12px;">⏳</div>
  <div style="font-weight:800;font-size:20px;color:#333;" id="ov-text">กำลังโหลดระบบ...</div>
</div>

<!-- Connection warning bar -->
<div class="conn-warn" id="conn-warn">⚠️ เชื่อมต่อขัดข้อง — กำลังลองใหม่...</div>

<!-- Custom Modal -->
<div id="custom-modal" class="modal-ov" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div id="modal-icon"      class="modal-icon">⚠️</div>
    <div id="modal-title"     class="modal-title">แจ้งเตือน</div>
    <div id="modal-msg"       class="modal-msg">ข้อความ</div>
    <div id="modal-btn-group" class="modal-btn-group"></div>
  </div>
</div>

<!-- ① Login screen -->
<div id="screen-login" class="screen hidden">
  <div class="setup-box">
    <div style="font-size:56px;margin-bottom:10px;">🎮</div>
    <h2>ห้องสอบสด (Live Quiz)</h2>
    <div style="font-size:14px;color:#888;margin-bottom:18px;" class="dynamic-app-name">Unit School</div>
    <!-- [FIX] ใช้ type=password + show/hide toggle แทน plain text -->
    <div class="pw-wrap">
      <input type="password" id="admin-pin" placeholder="รหัสผ่านผู้ดูแล" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
      <button class="pw-eye" onclick="togglePw()" id="pw-eye-btn" title="แสดง/ซ่อนรหัส">👁️</button>
    </div>
    <button class="btn btn-primary" style="width:100%;" id="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- ② Setup screen -->
<div id="screen-setup" class="screen hidden">
  <div class="setup-box">
    <h2 style="margin-bottom:14px;">📚 เลือกวิชาที่จะเปิดสอบ</h2>
    <select id="sel-subject">
      <option value="">กำลังโหลดวิชา...</option>
    </select>
    <button class="btn btn-primary" style="width:100%;" id="btn-start" onclick="startRoom()">เปิดห้องเรียน</button>
  </div>
</div>

<!-- ③ Lobby screen -->
<div id="screen-lobby" class="screen lobby-screen hidden">
  <div class="join-info">ให้<span class="dynamic-term-user">กำลังพล</span>เปิด LINE แล้วพิมพ์ว่า</div>
  <div class="join-pin">"🎮 สอบสด"</div>
  <div class="player-count">ผู้เข้าร่วม: <span id="h-player-count">0</span> คน</div>
  <div class="player-list" id="h-player-list"></div>
  <button class="btn" style="background:#fff;color:#000;padding:18px 56px;box-shadow:0 6px 0 rgba(0,0,0,0.3);"
          onclick="nextState('QUESTION')">เริ่มข้อที่ 1</button>
</div>

<!-- ④ Game (Question) screen -->
<div id="screen-game" class="screen hidden">
  <div class="q-container">
    <div class="q-header">
      <div class="q-counter" id="h-q-counter">ข้อ 1 / 10</div>
      <div class="ans-count">ตอบแล้ว: <span id="h-ans-count">0</span></div>
    </div>
    <div class="q-title" id="h-q-text">คำถาม?</div>
    <div class="q-layout">
      <div class="q-media" id="q-media">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="q-timer-circle" id="h-timer">20</div>
        </div>
      </div>
      <div class="chart-container hidden" id="h-chart">
        <div class="bar-wrap"><div class="bar-count" id="c-A">0</div><div class="bar bg-red"    id="b-A" style="height:4px;"></div></div>
        <div class="bar-wrap"><div class="bar-count" id="c-B">0</div><div class="bar bg-blue"   id="b-B" style="height:4px;"></div></div>
        <div class="bar-wrap"><div class="bar-count" id="c-C">0</div><div class="bar bg-yellow" id="b-C" style="height:4px;"></div></div>
        <div class="bar-wrap"><div class="bar-count" id="c-D">0</div><div class="bar bg-green"  id="b-D" style="height:4px;"></div></div>
      </div>
    </div>
    <div class="answers-grid">
      <div class="ans-box bg-red"    id="box-A" data-key=""><div class="shape shape-red"></div><span id="h-txt-A">-</span></div>
      <div class="ans-box bg-blue"   id="box-B" data-key=""><div class="shape shape-blue"></div><span id="h-txt-B">-</span></div>
      <div class="ans-box bg-yellow" id="box-C" data-key=""><div class="shape shape-yellow"></div><span id="h-txt-C">-</span></div>
      <div class="ans-box bg-green"  id="box-D" data-key=""><div class="shape shape-green"></div><span id="h-txt-D">-</span></div>
    </div>
  </div>
</div>

<!-- ⑤ Scoreboard (Podium) screen -->
<div id="screen-scoreboard" class="screen sb-screen hidden">
  <h1>🏆 อันดับคะแนน</h1>
  <div class="podium" id="podium-wrap"></div>
</div>

<!-- Top controls (visible only when room is active) -->
<div class="top-controls hidden" id="top-ctrl">
  <button class="btn" style="background:#fff;color:#000;padding:10px 20px;font-size:17px;"
          id="btn-next-step" onclick="handleNextStep()">ข้าม / ถัดไป</button>
  <button class="btn btn-danger" style="padding:10px 20px;font-size:17px;"
          onclick="confirmCloseRoom()">ปิดห้อง</button>
</div>

<script>
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const LIFF_ID  = '2009717287-DofMgtKC';
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

const POLL_MS         = 2000;   // [PERF] host poll ช้ากว่า player เล็กน้อยลด GAS quota
const POLL_TIMEOUT_MS = 8000;
const API_TIMEOUT_MS  = 15000;
const MAX_FAIL        = 4;

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let adminSecret      = '';    // [FIX] เก็บใน memory เท่านั้น ไม่ใส่ใน URL
let pollIntervalId   = null;
let countdownId      = null;
let failCount        = 0;
let currentState     = {};
let currentAnswers   = [];
let currentPlayers   = [];
let allMembers       = [];
let qTimeLeft        = 20;
let isTransitioning  = false; // [NEW] guard ป้องกัน nextState ซ้ำ

// ════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════
function showModal(icon, title, msg, isConfirm = false, onConfirm = null) {
  document.getElementById('modal-icon').textContent  = icon;
  document.getElementById('modal-title').textContent = title;
  // [FIX] ใช้ textContent ป้องกัน XSS
  document.getElementById('modal-msg').textContent   = msg;
  const grp = document.getElementById('modal-btn-group');
  if (isConfirm) {
    grp.innerHTML = `
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="modal-btn modal-btn-confirm" id="btn-modal-ok">ตกลง</button>`;
    document.getElementById('btn-modal-ok').onclick = () => { closeModal(); if (onConfirm) onConfirm(); };
  } else {
    grp.innerHTML = `<button class="modal-btn modal-btn-confirm" onclick="closeModal()">ตกลง</button>`;
  }
  document.getElementById('custom-modal').classList.add('active');
}
function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const configRes = await callAPI('GET', { action:'get_config' });
    if (configRes.status === 'ok' && configRes.config) applyTheme(configRes.config);

    document.getElementById('ov-load').classList.add('hidden');
    showScreen('screen-login');
    // focus ช่อง password ทันที
    setTimeout(() => document.getElementById('admin-pin')?.focus(), 100);
  } catch(e) {
    document.getElementById('ov-text').textContent = 'โหลดล้มเหลว: ' + (e.message || '');
    showModal('❌', 'เชื่อมต่อล้มเหลว', e.message || 'กรุณาลองใหม่');
  }
}

// ════════════════════════════════════════════
//  THEME
// ════════════════════════════════════════════
function applyTheme(c) {
  if (!c) return;
  if (c.colorPrimary)   document.documentElement.style.setProperty('--primary',   c.colorPrimary);
  if (c.colorSecondary) document.documentElement.style.setProperty('--secondary', c.colorSecondary);
  document.title = 'Live Host — ' + (c.appName || 'Unit School');
  document.querySelectorAll('.dynamic-app-name').forEach(el  => el.textContent = c.appName  || el.textContent);
  document.querySelectorAll('.dynamic-term-user').forEach(el => el.textContent = c.termUser || el.textContent);
}

// ════════════════════════════════════════════
//  SCREEN
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id !== 'ov-load') s.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  const showCtrl = !['screen-login','screen-setup'].includes(id);
  document.getElementById('top-ctrl').classList.toggle('hidden', !showCtrl);
}

// ════════════════════════════════════════════
//  PASSWORD TOGGLE
// ════════════════════════════════════════════
function togglePw() {
  const inp = document.getElementById('admin-pin');
  const btn = document.getElementById('pw-eye-btn');
  const show = inp.type === 'password';
  inp.type    = show ? 'text'     : 'password';
  btn.textContent = show ? '🙈' : '👁️';
}

// ════════════════════════════════════════════
//  MEMBER HELPERS
// ════════════════════════════════════════════
function getDisplayName(uid, fallback) {
  if (!uid) return fallback || '—';
  const m = allMembers.find(x => String(x.userId) === String(uid));
  return (m && m.nickname && m.nickname.trim()) ? m.nickname : (fallback || m?.fullName || '—');
}
function getPicUrl(uid) {
  const m = allMembers.find(x => String(x.userId) === String(uid));
  return (m && m.pictureUrl) ? m.pictureUrl : 'https://cdn-icons-png.flaticon.com/512/847/847969.png';
}

// ════════════════════════════════════════════
//  LOGIN
// [FIX] ส่ง secret ผ่าน POST body ไม่ใส่ใน GET URL parameter
// ════════════════════════════════════════════
async function doLogin() {
  const secret = document.getElementById('admin-pin').value.trim();
  if (!secret) return showModal('⚠️', 'แจ้งเตือน', 'กรุณาใส่รหัสผ่านก่อน');

  const btn = document.getElementById('btn-login');
  btn.textContent = 'กำลังตรวจสอบ...';
  btn.disabled    = true;

  try {
    // [FIX] ใช้ POST เพื่อไม่ให้ secret ปรากฏใน URL / GAS execution log
    const res = await callAPI('POST', { action:'admin_data', secret });
    if (res.status === 'ok') {
      adminSecret = secret;
      allMembers  = res.members || [];
      if (res.config) applyTheme(res.config);

      const qs   = (res.questions || []).filter(q => String(q.active).toUpperCase() === 'YES');
      const cats = [...new Set(qs.map(q => q.category || 'ทั่วไป'))];
      const sel  = document.getElementById('sel-subject');
      sel.innerHTML = cats.length
        ? cats.map(c => `<option value="${escH(c)}">${escH(c)}</option>`).join('')
        : '<option value="">ยังไม่มีข้อสอบในระบบ</option>';

      showScreen('screen-setup');
    } else {
      showModal('❌', 'เข้าสู่ระบบล้มเหลว', res.message || 'รหัสผ่านไม่ถูกต้อง');
      document.getElementById('admin-pin').value = '';
    }
  } catch(e) {
    showModal('❌', 'เกิดข้อผิดพลาด', e.message || 'ไม่สามารถเชื่อมต่อได้');
  } finally {
    btn.textContent = 'เข้าสู่ระบบ';
    btn.disabled    = false;
  }
}

// ════════════════════════════════════════════
//  START ROOM
// [FIX] secret ส่งผ่าน POST เสมอ
// ════════════════════════════════════════════
async function startRoom() {
  const subj = document.getElementById('sel-subject').value;
  if (!subj) return showModal('⚠️', 'แจ้งเตือน', 'กรุณาเลือกวิชาที่จะเปิดสอบ');

  const btn = document.getElementById('btn-start');
  btn.textContent = 'กำลังเปิดห้อง...';
  btn.disabled    = true;

  try {
    const res = await callAPI('POST', {
      action: 'live_host_action', secret: adminSecret,
      command: 'START', subject: subj
    });
    if (res.status === 'ok') {
      currentState = res.state;
      showScreen('screen-lobby');
      startPolling();
    } else {
      showModal('❌', 'ผิดพลาด', res.message || 'ไม่สามารถเปิดห้องได้');
    }
  } catch(e) {
    showModal('❌', 'การเชื่อมต่อขัดข้อง', 'กรุณาตรวจสอบอินเทอร์เน็ต');
  } finally {
    btn.textContent = 'เปิดห้องเรียน';
    btn.disabled    = false;
  }
}

// ════════════════════════════════════════════
//  POLLING
// ════════════════════════════════════════════
function startPolling() {
  stopPolling(); // [FIX] clear ก่อน ป้องกัน interval ซ้ำ
  pollIntervalId = setInterval(pollTick, POLL_MS);
}

function stopPolling() {
  if (pollIntervalId !== null) { clearInterval(pollIntervalId); pollIntervalId = null; }
}

async function pollTick() {
  try {
    // [FIX] host ใช้ GET (read-only) — ไม่ต้องส่ง secret ใน GET
    const res = await callAPI('GET', { action:'live_get_state', isHost:'true' }, POLL_TIMEOUT_MS);
    if (res.status === 'ok') {
      currentState   = res.state   || currentState;
      currentAnswers = res.answers || [];
      currentPlayers = res.players || res.participants || [];
      onPollSuccess();
      updateHostUI();
    } else {
      onPollFail();
    }
  } catch(e) {
    onPollFail();
  }
}

function onPollSuccess() {
  failCount = 0;
  document.getElementById('conn-warn').classList.remove('show');
}
function onPollFail() {
  failCount++;
  if (failCount >= MAX_FAIL) {
    document.getElementById('conn-warn').classList.add('show');
  }
}

// ════════════════════════════════════════════
//  UI UPDATE (lobby only — game screen is driven by renderState)
// ════════════════════════════════════════════
function updateHostUI() {
  if (currentState.status === 'LOBBY') {
    document.getElementById('h-player-count').textContent = currentPlayers.length;
    const listEl  = document.getElementById('h-player-list');
    const newHtml = currentPlayers.map(p =>
      `<div class="player-pill">
        <img src="${escH(getPicUrl(p.userId))}"
             onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
        ${escH(getDisplayName(p.userId, p.fullName))}
       </div>`
    ).join('');
    if (listEl.innerHTML !== newHtml) listEl.innerHTML = newHtml;
  }

  if (currentState.status === 'QUESTION' || currentState.status === 'REVEAL') {
    const idx      = currentState.currentQIndex;
    const ansCount = currentAnswers.filter(a => a.qIndex === idx).length;
    const total    = currentPlayers.length;
    document.getElementById('h-ans-count').textContent = `${ansCount} / ${total}`;
  }
}

// ════════════════════════════════════════════
//  STATE TRANSITIONS
// [FIX] เพิ่ม isTransitioning guard ป้องกัน double-click
// ════════════════════════════════════════════
async function nextState(newStatus) {
  if (isTransitioning) return;
  isTransitioning = true;

  let nextQIdx = currentState.currentQIndex;
  if (newStatus === 'QUESTION' && currentState.status === 'SCOREBOARD') {
    nextQIdx++;
    if (nextQIdx >= (currentState.questions || []).length) {
      isTransitioning = false;
      showModal('🎉', 'จบการสอน', 'ทำข้อสอบครบทุกข้อแล้ว!', false, confirmCloseRoom);
      return;
    }
  }

  try {
    const res = await callAPI('POST', {
      action: 'live_host_action', secret: adminSecret,
      command: 'UPDATE', status: newStatus, qIndex: nextQIdx
    }, API_TIMEOUT_MS);

    if (res.status === 'ok') {
      currentState.status       = newStatus;
      currentState.currentQIndex = nextQIdx;
      renderState();
    } else {
      showModal('❌', 'ผิดพลาด', res.message || 'ไม่สามารถเปลี่ยนสถานะได้');
    }
  } catch(e) {
    showModal('❌', 'เชื่อมต่อขัดข้อง', 'กรุณาลองใหม่');
  } finally {
    isTransitioning = false;
  }
}

// ════════════════════════════════════════════
//  RENDER STATE
// ════════════════════════════════════════════
function renderState() {
  const st = currentState.status;
  const q  = currentState.questions && currentState.questions[currentState.currentQIndex];

  if (st === 'QUESTION') {
    if (!q) return;
    showScreen('screen-game');

    // อัปเดต counter
    document.getElementById('h-q-counter').textContent =
      `ข้อ ${currentState.currentQIndex + 1} / ${currentState.questions.length}`;

    // reset UI
    document.getElementById('q-media').classList.remove('hidden');
    document.getElementById('h-chart').classList.add('hidden');
    ['A','B','C','D'].forEach(c => {
      const box = document.getElementById(`box-${c}`);
      box.classList.remove('dimmed','correct-box');
      document.getElementById(`h-txt-${c}`).textContent = '';
      box.setAttribute('data-key', '');
    });

    // คำถาม
    document.getElementById('h-q-text').textContent = q.questionText;

    // ตัวเลือก (ตามลำดับ shuffledKeys)
    const keys = Array.isArray(q.shuffledKeys) ? q.shuffledKeys : ['A','B','C','D'];
    const slots = ['A','B','C','D'];
    keys.forEach((k, i) => {
      if (!slots[i]) return;
      const box = document.getElementById(`box-${slots[i]}`);
      box.setAttribute('data-key', k);
      document.getElementById(`h-txt-${slots[i]}`).textContent = (q.choices && q.choices[k]) || '';
    });

    // countdown timer
    qTimeLeft = 20;
    stopCountdown();
    const timerEl = document.getElementById('h-timer');
    timerEl.textContent = qTimeLeft;
    timerEl.classList.remove('danger');
    document.getElementById('btn-next-step').textContent = 'ข้ามเวลา (โชว์เฉลย)';

    countdownId = setInterval(() => {
      qTimeLeft--;
      timerEl.textContent = qTimeLeft;
      if (qTimeLeft <= 5) timerEl.classList.add('danger');
      if (qTimeLeft <= 0) {
        stopCountdown();
        nextState('REVEAL');
      }
    }, 1000);
    return;
  }

  if (st === 'REVEAL') {
    stopCountdown();
    if (!q) return;

    document.getElementById('q-media').classList.add('hidden');
    document.getElementById('h-chart').classList.remove('hidden');

    const correctKey = q.correctAnswer;
    ['A','B','C','D'].forEach(c => {
      const box = document.getElementById(`box-${c}`);
      const k   = box.getAttribute('data-key');
      const isCorrect = k === correctKey;
      box.classList.toggle('dimmed',      !isCorrect);
      box.classList.toggle('correct-box',  isCorrect);
    });

    // count answers per display slot
    const counts = { A:0, B:0, C:0, D:0 };
    const qAnswers = currentAnswers.filter(a => a.qIndex === currentState.currentQIndex);
    qAnswers.forEach(a => {
      ['A','B','C','D'].forEach(c => {
        if (document.getElementById(`box-${c}`).getAttribute('data-key') === a.answer) counts[c]++;
      });
    });

    const maxCount = Math.max(...Object.values(counts), 1);
    ['A','B','C','D'].forEach(c => {
      document.getElementById(`c-${c}`).textContent    = counts[c];
      document.getElementById(`b-${c}`).style.height   = `${(counts[c] / maxCount) * 100}%`;
    });

    document.getElementById('btn-next-step').textContent = 'ดูอันดับคะแนน';
    return;
  }

  if (st === 'SCOREBOARD') {
    showScreen('screen-scoreboard');

    // รวมคะแนนแต่ละ user
    const scoreMap = {};
    currentAnswers.forEach(a => {
      if (!a.userId) return;
      if (!scoreMap[a.userId]) {
        scoreMap[a.userId] = { userId:a.userId, name:getDisplayName(a.userId, a.fullName), score:0 };
      }
      scoreMap[a.userId].score += Number(a.score) || 0;
    });

    const sorted = Object.values(scoreMap).sort((a, b) => b.score - a.score).slice(0, 3);
    const ORDER  = [1, 0, 2]; // แสดง 2nd, 1st, 3rd

    const html = ORDER.map(idx => {
      if (!sorted[idx]) return `<div class="podium-place p-${idx+1}"></div>`;
      const p = sorted[idx];
      return `
        <div class="podium-place p-${idx+1}">
          <div class="pod-avatar-wrap">
            <img src="${escH(getPicUrl(p.userId))}" class="pod-avatar"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
          </div>
          <div class="p-name">${escH(p.name)}</div>
          <div class="p-score">${p.score} คะแนน</div>
          <div class="p-block">${idx+1}</div>
        </div>`;
    }).join('');
    document.getElementById('podium-wrap').innerHTML = html;

    const isLast = currentState.currentQIndex >= (currentState.questions || []).length - 1;
    document.getElementById('btn-next-step').textContent = isLast ? 'จบการสอน' : 'ข้อถัดไป';
    return;
  }
}

// ════════════════════════════════════════════
//  STEP CONTROL
// ════════════════════════════════════════════
function handleNextStep() {
  if (isTransitioning) return;
  const st = currentState.status;
  if (st === 'QUESTION')   nextState('REVEAL');
  else if (st === 'REVEAL') nextState('SCOREBOARD');
  else if (st === 'SCOREBOARD') {
    const isLast = currentState.currentQIndex >= (currentState.questions || []).length - 1;
    if (isLast) confirmCloseRoom();
    else nextState('QUESTION');
  }
}

function confirmCloseRoom() {
  showModal('🚪', 'ยืนยันปิดห้อง', 'ยืนยันปิดห้องเรียนและลบข้อมูลการสอบสดครั้งนี้?', true, closeRoom);
}

async function closeRoom() {
  stopPolling();
  stopCountdown();
  try {
    await callAPI('POST', { action:'live_host_action', secret:adminSecret, command:'END' }, API_TIMEOUT_MS);
  } catch(e) { /* ไม่สำคัญ — ปิดหน้าต่อไปได้เลย */ }
  currentState   = {};
  currentAnswers = [];
  currentPlayers = [];
  showScreen('screen-setup');
}

// ════════════════════════════════════════════
//  COUNTDOWN HELPER
// ════════════════════════════════════════════
function stopCountdown() {
  if (countdownId !== null) { clearInterval(countdownId); countdownId = null; }
}

// ════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════
// [NEW] HTML escape สำหรับ innerHTML
function escH(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ════════════════════════════════════════════
//  API HELPER — POST เท่านั้น สำหรับ action ที่ต้องการ auth
// ════════════════════════════════════════════
async function callAPI(method, params, timeoutMs = API_TIMEOUT_MS) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url  = GAS_URL;
    let opts = { signal: ctrl.signal, redirect:'follow' };
    if (method === 'GET') {
      // [FIX] GET ใช้ได้เฉพาะ action ที่ไม่ต้องการ secret (get_config, live_get_state)
      url += '?' + new URLSearchParams(params).toString();
      opts.method = 'GET';
    } else {
      opts.method  = 'POST';
      opts.headers = { 'Content-Type':'text/plain' };
      opts.body    = JSON.stringify(params);
    }
    const resp = await fetch(url, opts);
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    if (e.name === 'AbortError') throw new Error('หมดเวลาเชื่อมต่อ');
    throw e;
  }
}

// ════════════════════════════════════════════
//  CLEANUP
// ════════════════════════════════════════════
function cleanup() { stopPolling(); stopCountdown(); }
window.addEventListener('pagehide',     cleanup);
window.addEventListener('beforeunload', cleanup);

// ── เริ่มต้น ──
init();
</script>
