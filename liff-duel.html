<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ลานประลองยุทธ์</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Tactical Theme */
  --primary: #2e7d32; 
  --primary-dark: #1b5e20;
  --secondary: #ffca28;
  --bg: #0a0a0a; --surface: #121212; --surf2: #1e1e1e;
  --border: #333333; --text: #e0e0e0; --muted: #888888;
  --danger: #ff5252; --success: #4caf50; --info: #29b6f6;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

/* Global Utils */
.hidden { display: none !important; }
.btn { width: 100%; padding: 14px 16px; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; display: flex; justify-content: center; align-items: center; gap: 8px;}
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.btn-gold { background: var(--secondary); color: #000; box-shadow: 0 4px 15px rgba(255,202,40,0.2); }
.btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); color: var(--danger); }
.btn:active { transform: scale(0.96); box-shadow: none; }

/* Screens & Topbar */
.screen { display: flex; flex-direction: column; height: 100vh; width: 100%; }
.top-bar { background: var(--surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
.t-app { font-weight: 800; font-size: 16px; color: var(--secondary); display: flex; align-items: center; gap: 6px; text-transform: uppercase;}
.t-subj { font-size: 12px; color: var(--muted); }
.main-area { flex: 1; padding: 20px; overflow-y: auto; }

/* Custom Modal Alert */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 50px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-transform: uppercase;}
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-cancel { background: var(--surf2); border: 1px solid var(--border); color: var(--text); }
.ca-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3); }
.ca-btn:active { transform: scale(0.96); }

/* Loaders */
.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.spinner { width: 45px; height: 45px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Cards & Lists (Lobby) */
.section-title { font-size: 16px; font-weight: 800; color: var(--secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; border-bottom: 1px dashed var(--border); padding-bottom: 8px;}
.duel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
.duel-header { display: flex; justify-content: space-between; align-items: center; }
.duel-title { font-weight: 800; font-size: 15px; color: var(--text); }
.duel-status { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 6px; }
.st-pending { background: rgba(255,202,40,0.15); color: var(--secondary); border: 1px solid rgba(255,202,40,0.3); }
.st-completed { background: rgba(76,175,80,0.15); color: var(--success); border: 1px solid rgba(76,175,80,0.3); }

.score-row { display: flex; justify-content: space-between; background: var(--surf2); padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
.score-name { color: var(--muted); font-size: 13px; }
.score-val { font-family: 'IBM Plex Mono', monospace; font-weight: 800; color: var(--text); }

/* Game UI */
.timer-bar { height: 6px; background: var(--surf2); width: 100%; }
.timer-fill { height: 100%; background: var(--secondary); width: 100%; transition: width 0.1s linear; }
.q-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin: 20px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.q-num { font-size: 13px; color: var(--secondary); font-weight: 800; margin-bottom: 10px; text-transform: uppercase;}
.q-text { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.5; }

.choices { display: flex; flex-direction: column; gap: 12px; }
.choice-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 15px; align-items: center; cursor: pointer; transition: 0.2s; color: var(--text); }
.c-label { font-family: 'IBM Plex Mono'; font-weight: 800; background: var(--surf2); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--muted); border: 1px solid var(--border);}
.choice-btn:active { transform: scale(0.98); background: var(--surf2); border-color: var(--secondary); }

/* Result UI */
.result-box { text-align: center; padding: 30px 20px; background: var(--surface); border-radius: 20px; border: 1px solid var(--border); margin-top: 10vh; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
.res-icon { font-size: 60px; margin-bottom: 10px; }
.res-title { font-size: 24px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase;}
.res-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin-bottom: 24px; }
.vs-col { background: var(--surf2); padding: 16px 10px; border-radius: 12px; border: 1px solid var(--border); }
.vs-name { font-size: 13px; color: var(--muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.vs-score { font-size: 28px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
.vs-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
.vs-badge { font-size: 16px; font-weight: 800; color: var(--secondary); background: rgba(255,202,40,0.1); padding: 8px 12px; border-radius: 50%; border: 1px solid rgba(255,202,40,0.3);}
</style>
</head>
<body>

<!-- Loading -->
<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="font-weight:700; color:var(--muted);">กำลังเชื่อมต่อลานประลอง...</div>
</div>

<!-- Custom Alert -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<!-- LOBBY SCREEN -->
<div id="lobby-ui" class="screen hidden">
  <div class="top-bar">
    <div class="t-app">⚔️ ลานประลองยุทธ์</div>
    <div class="t-subj" id="my-name">กำลังพล</div>
  </div>
  <div class="main-area">
    <div class="section-title">⚔️ ศูนย์ท้าประลอง</div>
    <div style="display:flex; gap:10px; margin-bottom:24px;">
      <select id="sel-target" style="flex:1; padding:12px; border-radius:8px; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'Sarabun'; outline:none;">
        <option value="">-- เลือกกำลังพลเป้าหมาย --</option>
      </select>
      <button class="btn btn-primary" style="width:auto; padding:0 20px;" onclick="initiateDuel()">ท้าดวล!</button>
    </div>

    <div class="section-title">📥 ภารกิจรอตอบรับ (Inbox)</div>
    <div id="list-pending" style="margin-bottom:24px;"></div>

    <div class="section-title">📜 ประวัติการประลอง</div>
    <div id="list-history"></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-ui" class="screen hidden">
  <div class="top-bar">
    <div class="t-app">⚔️ ปฏิบัติการประลอง</div>
    <div class="t-subj" style="font-family:'IBM Plex Mono'; font-weight:700; color:var(--secondary); font-size:14px;" id="game-score">แต้ม: 0</div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timer-bar"></div></div>
  
  <div class="main-area" style="display:flex; flex-direction:column;">
    <div class="q-box">
      <div class="q-num" id="q-label">ข้อ 1 / 5</div>
      <div class="q-text" id="q-text">โหลดคำสั่ง...</div>
    </div>
    <div class="choices">
      <div class="choice-btn" id="c-A" onclick="submitAnswer('A')"><div class="c-label">A</div><div id="t-A">-</div></div>
      <div class="choice-btn" id="c-B" onclick="submitAnswer('B')"><div class="c-label">B</div><div id="t-B">-</div></div>
      <div class="choice-btn" id="c-C" onclick="submitAnswer('C')"><div class="c-label">C</div><div id="t-C">-</div></div>
      <div class="choice-btn" id="c-D" onclick="submitAnswer('D')"><div class="c-label">D</div><div id="t-D">-</div></div>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-ui" class="screen hidden" style="padding:20px;">
  <div class="result-box">
    <div class="res-icon" id="res-icon">⏳</div>
    <div class="res-title" id="res-title">รอผลการดวล</div>
    <div class="res-sub" id="res-sub">ฝ่ายตรงข้ามยังไม่ได้รับคำท้า</div>
    
    <div class="vs-grid">
      <div class="vs-col">
        <div class="vs-name" id="res-c-name">Challenger</div>
        <div class="vs-score" id="res-c-score">0</div>
        <div class="vs-time" id="res-c-time">0.0s</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="vs-col">
        <div class="vs-name" id="res-t-name">Target</div>
        <div class="vs-score" id="res-t-score">?</div>
        <div class="vs-time" id="res-t-time">-</div>
      </div>
    </div>
    
    <button class="btn btn-outline" onclick="backToLobby()">← กลับศูนย์บัญชาการ</button>
  </div>
</div>

<script>
const LIFF_ID = '2009717287-UJ4Y1wtX'; // << [ใส่ LIFF ID ของลานประลอง]
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let userId = '', userName = '';
let currentDuel = null, questions = [], currentQ = 0;
let gameScore = 0, gameStartTime = 0;
let qStartTime = 0, totalTimeMs = 0;
let timerInt = null, timeLeft = 0;

function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `<button class="ca-btn ca-btn-confirm" onclick="closeCustomAlert()">รับทราบ</button>`;
  document.getElementById('custom-alert').classList.add('active');
}
function customConfirm(msg, callback, title="ยืนยันคำสั่ง", icon="❓", btnClass="ca-btn-confirm") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `
    <button class="ca-btn ca-btn-cancel" onclick="closeCustomAlert()">ยกเลิก</button>
    <button class="ca-btn ${btnClass}" id="btn-ca-ok">ยืนยัน</button>
  `;
  document.getElementById('btn-ca-ok').onclick = () => { closeCustomAlert(); callback(); };
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.remove('active'); }

function showScreen(id) {
  document.getElementById('lobby-ui').classList.add('hidden');
  document.getElementById('game-ui').classList.add('hidden');
  document.getElementById('result-ui').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}
function showLoading(text) { document.getElementById('ov-load').classList.remove('hidden'); document.getElementById('ov-load').querySelector('div:last-child').textContent = text; }
function hideLoading() { document.getElementById('ov-load').classList.add('hidden'); }
function showError(msg) { hideLoading(); customAlert(msg, 'ข้อผิดพลาด', '❌'); }

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    userId = p.userId; userName = p.displayName;
    document.getElementById('my-name').textContent = userName;
    
    const urlParams = new URLSearchParams(window.location.search);
    const duelId = urlParams.get('duelId');
    if(duelId) await acceptDuel(duelId); else await loadLobby();
  } catch(e) { showError(e.message); }
}

async function loadLobby() {
  showLoading('กำลังเชื่อมต่อลานประลอง...');
  try {
    const res = await callAPI('GET', { action: 'get_duel_inbox', userId });
    if(res.status !== 'ok') throw new Error(res.message);
    
    const sel = document.getElementById('sel-target');
    sel.innerHTML = '<option value="">-- เลือกกำลังพลเป้าหมาย --</option>';
    (res.members||[]).forEach(m => {
       const nick = m.nickname ? ` (${m.nickname})` : '';
       sel.innerHTML += `<option value="${m.userId}">${m.fullName}${nick} [${m.rank}]</option>`;
    });

    const pendList = document.getElementById('list-pending');
    const histList = document.getElementById('list-history');
    pendList.innerHTML = ''; histList.innerHTML = '';
    
    let hasPending = false, hasHistory = false;
    
    (res.duels||[]).forEach(d => {
       const isChallenger = d.cId === userId;
       const opponentName = isChallenger ? d.tName : d.cName;
       
       if(d.status === 'PENDING') {
         hasPending = true;
         if(!isChallenger) {
           pendList.innerHTML += `
             <div class="duel-card" style="border-color:var(--secondary);">
               <div class="duel-header">
                 <div class="duel-title">⚔️ คำท้าจาก: ${d.cName}</div>
                 <div class="duel-status st-pending">รอดวล</div>
               </div>
               <button class="btn btn-gold" style="padding:10px; font-size:14px;" onclick="acceptDuel('${d.duelId}')">รับคำท้าและดวลทันที</button>
             </div>
           `;
         } else {
           pendList.innerHTML += `
             <div class="duel-card">
               <div class="duel-header">
                 <div class="duel-title">🎯 ท้าไปยัง: ${d.tName}</div>
                 <div class="duel-status st-pending" style="background:var(--surf2); color:var(--muted); border-color:var(--border);">รอตอบรับ</div>
               </div>
               <button class="btn btn-outline" style="padding:10px; font-size:14px;" onclick="viewResult('${d.duelId}')">ดูสถานะ</button>
             </div>
           `;
         }
       } else {
         hasHistory = true;
         const myScore = isChallenger ? d.cScore : d.tScore;
         const opScore = isChallenger ? d.tScore : d.cScore;
         const myTime = (isChallenger ? d.cTime : d.tTime) / 1000;
         const opTime = (isChallenger ? d.tTime : d.cTime) / 1000;
         
         let resultText = 'เสมอ', resColor = 'var(--muted)', resBg = 'var(--surf2)';
         if(myScore > opScore || (myScore === opScore && myTime < opTime)) { resultText = 'ชนะ'; resColor = 'var(--success)'; resBg = 'rgba(76,175,80,0.15)'; }
         else if(opScore > myScore || (myScore === opScore && opTime < myTime)) { resultText = 'พ่ายแพ้'; resColor = 'var(--danger)'; resBg = 'rgba(255,82,82,0.15)'; }
         
         histList.innerHTML += `
           <div class="duel-card" onclick="viewResult('${d.duelId}')" style="cursor:pointer; transition:0.2s;">
             <div class="duel-header">
               <div class="duel-title">VS ${opponentName}</div>
               <div class="duel-status" style="background:${resBg}; color:${resColor}; border:1px solid ${resColor};">${resultText}</div>
             </div>
             <div class="score-row">
               <div style="flex:1;">
                 <div class="score-name">คุณ</div>
                 <div class="score-val">${myScore} <span style="font-size:11px; color:var(--muted); font-weight:400;">(${myTime.toFixed(1)}s)</span></div>
               </div>
               <div style="flex:1; text-align:right;">
                 <div class="score-name">คู่ต่อสู้</div>
                 <div class="score-val">${opScore} <span style="font-size:11px; color:var(--muted); font-weight:400;">(${opTime.toFixed(1)}s)</span></div>
               </div>
             </div>
           </div>
         `;
       }
    });
    
    if(!hasPending) pendList.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:13px; padding:20px; border:1px dashed var(--border); border-radius:12px;">ไม่มีคำท้าที่รออยู่</div>';
    if(!hasHistory) histList.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:13px;">ยังไม่มีประวัติการประลอง</div>';
    
    hideLoading(); showScreen('lobby-ui');
  } catch(e) { showError(e.message); }
}

async function initiateDuel() {
  const targetId = document.getElementById('sel-target').value;
  if(!targetId) return customAlert('กรุณาเลือกกำลังพลที่ต้องการท้าประลอง!', 'แจ้งเตือน', '⚠️');
  
  customConfirm('คุณพร้อมที่จะทำแบบทดสอบแบบสุ่ม 5 ข้อ (จับเวลา) เพื่อส่งคำท้าไปหรือไม่?', async () => {
    showLoading('กำลังเตรียมสนาม...');
    try {
      const res = await callAPI('GET', { action: 'get_questions', userId });
      if(res.status !== 'ok') throw new Error(res.message);
      
      const allQs = res.questions || [];
      if(allQs.length < 5) throw new Error('คลังข้อสอบมีไม่เพียงพอสำหรับการประลอง');
      
      questions = allQs.sort(() => Math.random() - 0.5).slice(0, 5);
      currentDuel = { cId: userId, tId: targetId, isCreating: true, qIds: questions.map(q => q.questionId) };
      
      hideLoading(); startGame();
    } catch(e) { showError(e.message); }
  }, 'เริ่มการประลอง', '⚔️');
}

async function acceptDuel(duelId) {
  showLoading('กำลังโหลดข้อมูลคำท้า...');
  try {
    const res = await callAPI('GET', { action: 'get_duel_data', duelId });
    if(res.status !== 'ok') throw new Error(res.message);
    
    currentDuel = res.duel;
    questions = res.questions;
    
    if(currentDuel.status === 'COMPLETED' || currentDuel.cId === userId) {
      hideLoading();
      return renderResult(currentDuel);
    }
    
    hideLoading();
    customConfirm(`<b>${currentDuel.cName}</b> ได้ส่งคำท้าประลองมาให้คุณ!<br><br>พร้อมที่จะทำแบบทดสอบ 5 ข้อแข่งขันเวลาหรือไม่?`, () => {
      startGame();
    }, 'รับคำท้า', '⚔️', 'ca-btn-confirm');
  } catch(e) { showError(e.message); }
}

function startGame() {
  currentQ = 0; gameScore = 0; totalTimeMs = 0; gameStartTime = Date.now();
  showScreen('game-ui');
  loadQuestion();
}

function loadQuestion() {
  if (currentQ >= questions.length) { endDuel(); return; }
  
  const q = questions[currentQ];
  document.getElementById('q-label').textContent = `ข้อ ${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.questionText;
  
  ['A','B','C','D'].forEach(k => {
    const btn = document.getElementById(`c-${k}`);
    document.getElementById(`t-${k}`).textContent = q.choices[k] || '-';
    btn.style.display = q.choices[k] ? 'flex' : 'none';
    btn.style.pointerEvents = 'auto';
    btn.style.opacity = '1';
    btn.style.borderColor = 'var(--border)';
  });
  
  timeLeft = 10000; qStartTime = Date.now();
  clearInterval(timerInt);
  
  timerInt = setInterval(() => {
    timeLeft -= 50;
    const pct = Math.max(0, (timeLeft / 10000) * 100);
    const bar = document.getElementById('timer-bar');
    bar.style.width = pct + '%';
    bar.style.background = pct > 30 ? 'var(--secondary)' : 'var(--danger)';
    
    if(timeLeft <= 0) { clearInterval(timerInt); submitAnswer(''); }
  }, 50);
}

function submitAnswer(ans) {
  clearInterval(timerInt);
  const timeTaken = Date.now() - qStartTime;
  totalTimeMs += timeTaken;
  
  const q = questions[currentQ];
  const isCorrect = ans && (ans === q.correctAnswer || true); // Frontend Mock Check
  
  if(isCorrect && ans !== '') {
    const timeBonus = Math.floor((Math.max(0, 10000 - timeTaken) / 10000) * 50);
    gameScore += (100 + timeBonus);
    document.getElementById('game-score').textContent = `แต้ม: ${gameScore}`;
    if(ans) document.getElementById(`c-${ans}`).style.borderColor = 'var(--success)';
  } else {
    if(ans) document.getElementById(`c-${ans}`).style.borderColor = 'var(--danger)';
  }
  
  ['A','B','C','D'].forEach(k => { document.getElementById(`c-${k}`).style.pointerEvents = 'none'; });
  
  setTimeout(() => { currentQ++; loadQuestion(); }, 600);
}

async function endDuel() {
  showLoading('กำลังส่งรายงานการประลอง...');
  try {
    if(currentDuel.isCreating) {
      const res = await callAPI('POST', { action: 'create_duel', userId, targetId: currentDuel.tId, score: gameScore, timeMs: totalTimeMs, qIds: currentDuel.qIds });
      if(res.status !== 'ok') throw new Error(res.message);
      customAlert('ส่งคำท้าประลองไปยังคู่ต่อสู้เรียบร้อยแล้ว!', 'สำเร็จ', '📤');
      backToLobby();
    } else {
      const res = await callAPI('POST', { action: 'submit_duel', userId, duelId: currentDuel.duelId, score: gameScore, timeMs: totalTimeMs });
      if(res.status !== 'ok') throw new Error(res.message);
      
      const updatedDuel = { ...currentDuel, tScore: gameScore, tTime: totalTimeMs, status: 'COMPLETED' };
      renderResult(updatedDuel);
    }
  } catch(e) { showError(e.message); }
}

async function viewResult(duelId) {
  showLoading('ตรวจสอบข้อมูล...');
  try {
    const res = await callAPI('GET', { action: 'get_duel_data', duelId });
    if(res.status !== 'ok') throw new Error(res.message);
    renderResult(res.duel);
  } catch(e) { showError(e.message); }
}

function renderResult(duel) {
  hideLoading();
  const isC = userId === duel.cId;
  const myScore = isC ? duel.cScore : duel.tScore;
  const opScore = isC ? duel.tScore : duel.cScore;
  const myTime = (isC ? duel.cTime : duel.tTime) / 1000;
  const opTime = (isC ? duel.tTime : duel.cTime) / 1000;
  
  document.getElementById('res-c-name').textContent = isC ? 'คุณ' : duel.cName;
  document.getElementById('res-t-name').textContent = isC ? duel.tName : 'คุณ';
  
  document.getElementById('res-c-score').textContent = duel.cScore !== '' ? duel.cScore : '?';
  document.getElementById('res-c-time').textContent = duel.cTime !== '' ? (duel.cTime/1000).toFixed(1)+'s' : '-';
  
  document.getElementById('res-t-score').textContent = duel.tScore !== '' ? duel.tScore : '?';
  document.getElementById('res-t-time').textContent = duel.tTime !== '' ? (duel.tTime/1000).toFixed(1)+'s' : '-';
  
  const rIcon = document.getElementById('res-icon');
  const rTitle = document.getElementById('res-title');
  const rSub = document.getElementById('res-sub');
  
  if (duel.status === 'PENDING') {
    rIcon.textContent = '⏳'; rTitle.textContent = 'รอผลการดวล'; rTitle.style.color = 'var(--secondary)';
    rSub.textContent = 'เป้าหมายยังไม่ได้ดำเนินการตอบรับคำท้า';
  } else {
    let won = false, tie = false;
    if(myScore > opScore) won = true;
    else if(myScore === opScore && myTime < opTime) won = true;
    else if(myScore === opScore && myTime === opTime) tie = true;
    
    if(tie) {
      rIcon.textContent = '🤝'; rTitle.textContent = 'ผลเสมอ'; rTitle.style.color = 'var(--muted)';
      rSub.textContent = 'ฝีมือสูสี กินกันไม่ลง!';
    } else if(won) {
      rIcon.textContent = '🏆'; rTitle.textContent = 'ชัยชนะ!'; rTitle.style.color = 'var(--success)';
      rSub.textContent = 'คุณคือผู้ชนะในสมรภูมินี้ รับโบนัสเหรียญ PX พิเศษ';
    } else {
      rIcon.textContent = '💀'; rTitle.textContent = 'พ่ายแพ้'; rTitle.style.color = 'var(--danger)';
      rSub.textContent = 'พ่ายแพ้ในสมรภูมิครั้งนี้ กลับไปฝึกฝนมาใหม่!';
    }
  }
  showScreen('result-ui');
}

function backToLobby() { window.history.replaceState({}, document.title, window.location.pathname); loadLobby(); }

async function callAPI(method, params, timeoutMs=20000) {
  const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL, opts = { signal:ctrl.signal, redirect:'follow' };
    if (method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts.method = 'GET'; } 
    else { opts.method = 'POST'; opts.headers = { 'Content-Type':'text/plain' }; opts.body = JSON.stringify(params); }
    const resp = await fetch(url, opts); clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status); return await resp.json();
  } catch(e) { clearTimeout(tid); throw e; }
}

init();
</script>
