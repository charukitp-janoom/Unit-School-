<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ร้านค้าสวัสดิการ PX</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Tactical Theme */
  --primary: #2e7d32; 
  --primary-dark: #1b5e20;
  --secondary: #ffca28;
  --bg: #050505; --surface: #121212; --surf2: #1e1e1e;
  --border: #333333; --text: #e0e0e0; --muted: #888888;
  --success: #388e3c; --danger: #d32f2f; --info: #1976d2;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

/* Effects */
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(46, 125, 50, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(46, 125, 50, 0.05) 1px, transparent 1px); background-size: 20px 20px; z-index: -1;}

/* Top Bar */
.top-bar { background: var(--surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
.t-app { font-weight: 800; font-size: 16px; color: var(--secondary); display: flex; align-items: center; gap: 6px; text-transform: uppercase;}
.t-coin { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 700; color: var(--secondary); background: rgba(255,202,40,0.1); border: 1px solid rgba(255,202,40,0.3); padding: 4px 12px; border-radius: 20px;}

/* Tabs */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s;}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(46,125,50,0.1); }

.main-area { flex: 1; padding: 20px; overflow-y: auto; max-width: 600px; margin: 0 auto; width: 100%;}
.tab-content { display: none; flex-direction: column; gap: 16px; }
.tab-content.active { display: flex; }

/* Cards (Store) */
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s;}
.item-img-wrap { width: 100%; height: 160px; background: #fff; position: relative; border-bottom: 1px solid var(--border);}
.item-img { width: 100%; height: 100%; object-fit: cover; }
.item-stock { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; border: 1px solid var(--border);}
.item-stock.low { color: var(--danger); border-color: var(--danger); }
.item-info { padding: 16px; display: flex; flex-direction: column; gap: 8px;}
.item-title { font-size: 18px; font-weight: 800; color: var(--text); }
.item-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;}
.item-price { font-family: 'IBM Plex Mono'; font-size: 18px; font-weight: 800; color: var(--secondary); }

/* Buttons */
.btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; text-transform: uppercase;}
.btn:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.btn-disabled { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); pointer-events: none; }

/* Cards (History) */
.hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
.hist-header { display: flex; justify-content: space-between; align-items: flex-start; }
.hist-title { font-size: 15px; font-weight: 700; color: var(--text); }
.hist-price { font-family: 'IBM Plex Mono'; font-size: 13px; color: var(--secondary); font-weight: 800;}
.hist-time { font-size: 11px; color: var(--muted); margin-top: 6px;}

.status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase;}
.st-pending { background: rgba(255,202,40,0.15); color: var(--secondary); border: 1px solid rgba(255,202,40,0.3); }
.st-approved { background: rgba(56,142,60,0.15); color: var(--success); border: 1px solid rgba(56,142,60,0.3); }
.st-rejected { background: rgba(211,47,47,0.15); color: var(--danger); border: 1px solid rgba(211,47,47,0.3); }

/* Custom Modal */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 50px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-transform: uppercase;}
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-cancel { background: var(--surf2); border: 1px solid var(--border); color: var(--text); }
.ca-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(46,125,50,0.3); }
.ca-btn:active { transform: scale(0.96); }

/* Loaders */
.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.spinner { width: 45px; height: 45px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- Loading -->
<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="font-weight:700; color:var(--muted);" id="load-msg">กำลังเชื่อมต่อคลังสวัสดิการ...</div>
</div>

<!-- Custom Alert -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<div class="top-bar">
  <div class="t-app">🛒 สวัสดิการ PX</div>
  <div class="t-coin" id="u-coin">🪙 0</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('store')">รายการสวัสดิการ</div>
  <div class="tab" onclick="switchTab('history')">ประวัติการเบิก</div>
</div>

<div class="main-area">
  
  <!-- Store Tab -->
  <div id="tab-store" class="tab-content active">
    <div style="text-align:center; margin-bottom:10px;">
      <div style="font-size:13px; color:var(--muted);">นำเหรียญ PX ยื่นคำขอเบิกสวัสดิการได้ที่นี่</div>
    </div>
    <div id="list-items" style="display:flex; flex-direction:column; gap:16px;"></div>
    <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:10px;" onclick="liff.closeWindow()">← กลับศูนย์บัญชาการ</button>
  </div>
  
  <!-- History Tab -->
  <div id="tab-history" class="tab-content">
    <div id="list-history" style="display:flex; flex-direction:column; gap:12px;"></div>
  </div>

</div>

<script>
const LIFF_ID = '2009717287-rli41ASz'; // << [ใส่ LIFF ID ของหน้าร้านค้า PX]
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let userId = '';
let currentBalance = 0;

function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `<button class="ca-btn ca-btn-confirm" onclick="closeCustomAlert()">รับทราบ</button>`;
  document.getElementById('custom-alert').classList.add('active');
}
function customConfirm(msg, callback, title="ยืนยันคำสั่ง", icon="❓", btnClass="ca-btn-confirm") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `
    <button class="ca-btn ca-btn-cancel" onclick="closeCustomAlert()">ยกเลิก</button>
    <button class="ca-btn ${btnClass}" id="btn-ca-ok">ยืนยัน</button>
  `;
  document.getElementById('btn-ca-ok').onclick = () => { closeCustomAlert(); callback(); };
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.remove('active'); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    userId = (await liff.getProfile()).userId;
    await loadStoreData();
    
  } catch(e) {
    document.getElementById('ov-load').innerHTML = `<div style="font-size:50px;">⚠️</div><p style="color:var(--danger); margin-top:10px;">${e.message}</p>`;
  }
}

async function loadStoreData() {
  document.getElementById('ov-load').classList.remove('hidden');
  try {
    const res = await callAPI('GET', { action: 'get_store_data', userId: userId });
    if (res.status !== 'ok') throw new Error(res.message);
    
    currentBalance = Number(res.balance || 0);
    document.getElementById('u-coin').textContent = `🪙 ${currentBalance}`;
    
    renderStore(res.rewards || []);
    renderHistory(res.history || []);
    
    document.getElementById('ov-load').classList.add('hidden');
  } catch(e) {
    document.getElementById('ov-load').classList.add('hidden');
    customAlert(e.message, 'การเชื่อมต่อล้มเหลว', '📡');
  }
}

function renderStore(items) {
  const list = document.getElementById('list-items');
  list.innerHTML = '';
  
  if(items.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--muted); padding:20px;">PX ยังไม่มีสินค้านำเข้า</div>';
    return;
  }
  
  items.forEach(r => {
    const canAfford = currentBalance >= r.price;
    const isOutOfStock = r.stock <= 0;
    
    let btnHtml = '';
    if(isOutOfStock) {
      btnHtml = `<button class="btn btn-disabled">สินค้าหมด</button>`;
    } else if(!canAfford) {
      btnHtml = `<button class="btn btn-disabled">เหรียญ PX ไม่พอ</button>`;
    } else {
      btnHtml = `<button class="btn btn-primary" onclick="reqRedeem('${r.id}', '${r.name}', ${r.price})">🛒 ยื่นคำขอเบิก (${r.price} PX)</button>`;
    }
    
    const stockClass = r.stock <= 5 ? 'low' : '';
    const imgUrl = r.image || 'https://cdn-icons-png.flaticon.com/512/10398/10398492.png';
    
    list.innerHTML += `
      <div class="item-card">
        <div class="item-img-wrap">
          <img src="${imgUrl}" class="item-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10398/10398492.png'">
          <div class="item-stock ${stockClass}">คงเหลือ: ${r.stock}</div>
        </div>
        <div class="item-info">
          <div class="item-title">${r.name}</div>
          <div class="item-desc">${r.desc}</div>
          <div class="item-price">🪙 ${r.price}</div>
          <div style="margin-top:8px;">${btnHtml}</div>
        </div>
      </div>
    `;
  });
}

function renderHistory(history) {
  const list = document.getElementById('list-history');
  list.innerHTML = '';
  
  if(history.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--muted); padding:20px;">ยังไม่มีประวัติการเบิกสวัสดิการ</div>';
    return;
  }
  
  history.forEach(h => {
    let stClass = '', stText = '';
    if(h.status === 'PENDING') { stClass = 'st-pending'; stText = 'รออนุมัติ'; }
    else if(h.status === 'APPROVED') { stClass = 'st-approved'; stText = 'อนุมัติแล้ว'; }
    else if(h.status === 'REJECTED') { stClass = 'st-rejected'; stText = 'ถูกปฏิเสธ (คืนเหรียญ)'; }
    
    list.innerHTML += `
      <div class="hist-card">
        <div class="hist-header">
          <div>
            <div class="hist-title">${h.rewardName}</div>
            <div class="hist-price">- ${h.price} PX</div>
          </div>
          <div class="status-badge ${stClass}">${stText}</div>
        </div>
        <div class="hist-time">เวลาทำรายการ: ${h.timestamp}</div>
      </div>
    `;
  });
}

function reqRedeem(id, name, price) {
  customConfirm(`ยืนยันการขอเบิกสวัสดิการ<br><b style="color:var(--secondary); font-size:16px;">"${name}"</b><br>ระบบจะหัก <b style="color:var(--danger);">${price} PX</b> จากบัญชีของท่าน`, () => {
    processRedeem(id);
  }, 'ยื่นคำขอเบิกสวัสดิการ', '🛒');
}

async function processRedeem(rewardId) {
  document.getElementById('ov-load').classList.remove('hidden');
  document.getElementById('load-msg').textContent = 'กำลังส่งคำสั่งเบิกสวัสดิการ...';
  try {
    const res = await callAPI('POST', { action: 'redeem_reward', userId: userId, rewardId: rewardId });
    if(res.status === 'ok') {
      customAlert('ส่งคำขอสำเร็จ! โปรดรอการอนุมัติจากศูนย์บัญชาการ', 'ภารกิจสำเร็จ', '✅');
      await loadStoreData(); // โหลดข้อมูลใหม่เพื่ออัปเดตยอดเงิน
      switchTab('history'); // สลับไปหน้าประวัติ
    } else {
      throw new Error(res.message);
    }
  } catch(e) {
    document.getElementById('ov-load').classList.add('hidden');
    customAlert(e.message, 'ผิดพลาด', '❌');
  }
}

async function callAPI(method, params, timeoutMs=20000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL, opts = { signal:ctrl.signal, redirect:'follow' };
    if (method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts.method = 'GET'; } 
    else { opts.method  = 'POST'; opts.headers = { 'Content-Type':'text/plain' }; opts.body = JSON.stringify(params); }
    const resp = await fetch(url, opts);
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

init();
</script>
</body>
</html>
