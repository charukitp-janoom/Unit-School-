<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>รายงานตัวกำลังพล</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* ธีมทหาร: Army Green & Gold */
  --primary: #2e7d32;
  --primary-dark: #1b5e20;
  --secondary: #ffca28;
  --bg: #121212;
  --surface: #1e1e1e;
  --border: #333333;
  --text: #e0e0e0;
  --muted: #888888;
  --danger: #ff5252;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

.header-title { font-size: 26px; font-weight: 800; color: var(--secondary); margin-bottom: 5px; text-align: center; text-transform: uppercase; letter-spacing: 1px;}
.header-sub { text-align: center; color: var(--muted); margin-bottom: 15px; font-size: 14px; }

.container { width: 100%; max-width: 420px; background: var(--surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 10px;}

/* Profile Display Section */
.profile-card { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
.profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 12px; box-shadow: 0 0 15px rgba(46, 125, 50, 0.4); background: #111; }
.profile-name { font-size: 18px; font-weight: 700; color: var(--text); }
.profile-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* Form Elements */
.form-group { margin-bottom: 16px; }
.form-label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); font-weight: 600; }
.form-control { width: 100%; background: #0a0a0a; border: 1px solid var(--border); color: #fff; padding: 14px 16px; border-radius: 8px; font-family: 'Sarabun'; font-size: 16px; transition: 0.2s; outline: none; }
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.2); }

select.form-control { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }

.btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
.btn:active { transform: scale(0.96); box-shadow: none; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* Overlay Loading */
.ov { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.spinner { width: 45px; height: 45px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.hidden { display: none !important; }

/* Custom Modal Alert */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.ca-btn { width: 100%; padding: 12px 0; border-radius: 10px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; border: none; background: var(--primary); color: #fff; transition: 0.2s;}
.ca-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div id="load-text" style="color:var(--muted); font-weight:600;">กำลังเชื่อมต่อศูนย์ข้อมูล...</div>
</div>

<!-- Custom Alert Modal -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <button class="ca-btn" onclick="closeCustomAlert()">รับทราบ</button>
  </div>
</div>

<div class="header-title dynamic-app-name">Smart Soldier Online</div>
<div class="header-sub">แบบฟอร์มรายงานตัวกำลังพล (รปจ.)</div>

<div class="container hidden" id="main-ui">
  <!-- Profile Section -->
  <div class="profile-card">
    <img src="" id="p-img" class="profile-img" alt="Profile" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
    <div id="p-name" class="profile-name">-</div>
    <div class="profile-sub">ดึงข้อมูลจาก LINE อัตโนมัติ</div>
  </div>

  <form id="reg-form" onsubmit="submitForm(event)">
    <div class="form-group">
      <label class="form-label">ยศ (Rank) <span style="color:var(--danger)">*</span></label>
      <select id="i-rank" class="form-control" required>
        <option value="" disabled selected>-- เลือกยศ --</option>
        <option value="พลฯ">พลทหาร (พลฯ)</option>
        <option value="ส.ต.">สิบตรี (ส.ต.)</option>
        <option value="ส.ท.">สิบโท (ส.ท.)</option>
        <option value="ส.อ.">สิบเอก (ส.อ.)</option>
        <option value="จ.ส.ต.">จ่าสิบตรี (จ.ส.ต.)</option>
        <option value="จ.ส.ท.">จ่าสิบโท (จ.ส.ท.)</option>
        <option value="จ.ส.อ.">จ่าสิบเอก (จ.ส.อ.)</option>
        <option value="ร.ต.">ร้อยตรี (ร.ต.)</option>
        <option value="ร.ท.">ร้อยโท (ร.ท.)</option>
        <option value="ร.อ.">ร้อยเอก (ร.อ.)</option>
        <option value="พ.ต.">พันตรี (พ.ต.)</option>
        <option value="พ.ท.">พันโท (พ.ท.)</option>
        <option value="พ.อ.">พันเอก (พ.อ.)</option>
        <option value="นชท.">นักเรียนช่างฝีมือทหาร (นชท.)</option>
        <option value="นนส.">นักเรียนนายสิบ (นนส.)</option>
        <option value="นนร.">นักเรียนนายร้อย (นนร.)</option>
        <option value="นาย">นาย (พลเรือน)</option>
        <option value="นาง">นาง (พลเรือน)</option>
        <option value="นางสาว">นางสาว (พลเรือน)</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">ชื่อ - นามสกุล (ไม่ต้องใส่ยศ) <span style="color:var(--danger)">*</span></label>
      <input type="text" id="i-fullname" class="form-control" placeholder="เช่น ใจดี มีสุข" required>
    </div>

    <div class="form-group">
      <label class="form-label">ชื่อเล่น (Nickname)</label>
      <input type="text" id="i-nickname" class="form-control" placeholder="เช่น ผู้กองเบิร์ด, จ่าแดง (ถ้ามี)">
    </div>

    <div class="form-group">
      <label class="form-label">ตำแหน่ง / สังกัด <span style="color:var(--danger)">*</span></label>
      <input type="text" id="i-position" class="form-control" placeholder="เช่น ผบ.หมู่ ร.1 พัน.1" required>
    </div>

    <button type="submit" id="btn-submit" class="btn">ยืนยันการรายงานตัว</button>
  </form>
</div>

<script>
// >>> เปลี่ยน LIFF_ID และ GAS_URL ให้ตรงกับของคุณ <<<
const LIFF_ID = '2009717287-28e2ynXL';   
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let profileData = null;

// Custom Alert Function
function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { 
  document.getElementById('custom-alert').classList.remove('active'); 
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    // ดึง Config เพื่อโหลดสีและชื่อแอป
    try {
      const configRes = await callAPI('GET', { action: 'get_config' });
      if(configRes.status === 'ok' && configRes.config) {
        const c = configRes.config;
        document.documentElement.style.setProperty('--primary', c.colorPrimary);
        document.documentElement.style.setProperty('--secondary', c.colorSecondary);
        document.querySelectorAll('.dynamic-app-name').forEach(el => el.textContent = c.appName);
        document.title = "รายงานตัว - " + c.appName;
      }
    } catch(e) { console.log('Config Load Warning:', e); }

    // ดึงข้อมูลโปรไฟล์จาก LINE
    profileData = await liff.getProfile();
    
    // อัปเดตรูปภาพโปรไฟล์และชื่อลงในหน้าจอ
    document.getElementById('p-img').src = profileData.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/847/847969.png';
    document.getElementById('p-name').textContent = profileData.displayName;

    document.getElementById('load-text').textContent = 'ตรวจสอบประวัติกำลังพล...';
    
    // ตรวจสอบประวัติการลงทะเบียน
    const res = await callAPI('GET', { action: 'get_member', userId: profileData.userId });
    
    if (res.status === 'ok' && res.member) {
      // หากเคยลงทะเบียนแล้ว ให้ดึงข้อมูลมาแสดงเป็นค่า Default 
      document.getElementById('i-rank').value = res.member.rank;
      document.getElementById('i-fullname').value = res.member.fullName;
      document.getElementById('i-nickname').value = res.member.nickname || '';
      document.getElementById('i-position').value = res.member.position;
      document.getElementById('btn-submit').textContent = 'อัปเดตประวัติกำลังพล';
    }

    // ปิดหน้าโหลดและแสดงฟอร์ม
    document.getElementById('ov-load').classList.add('hidden');
    document.getElementById('main-ui').classList.remove('hidden');

  } catch(e) {
    document.getElementById('ov-load').classList.add('hidden');
    customAlert(e.message, 'เชื่อมต่อล้มเหลว', '❌');
  }
}

async function submitForm(e) {
  e.preventDefault();
  if(!profileData) return;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'กำลังส่งข้อมูล...';
  document.getElementById('ov-load').classList.remove('hidden');
  document.getElementById('load-text').textContent = 'กำลังบันทึกลงฐานข้อมูล...';

  // เตรียมข้อมูลส่งไปที่ GAS (มีช่อง nickname เพิ่มเข้ามา)
  const payload = {
    action: 'liff_register',
    userId: profileData.userId,
    displayName: profileData.displayName,
    pictureUrl: profileData.pictureUrl || '', 
    rank: document.getElementById('i-rank').value,
    fullName: document.getElementById('i-fullname').value,
    nickname: document.getElementById('i-nickname').value,
    position: document.getElementById('i-position').value
  };

  try {
    const res = await callAPI('POST', payload);
    document.getElementById('ov-load').classList.add('hidden');
    
    if(res.status === 'ok') {
      document.getElementById('main-ui').innerHTML = `
        <div style="text-align:center; padding: 40px 0;">
          <div style="font-size:70px; margin-bottom:10px; color:var(--primary);">🎖️</div>
          <h2 style="color:var(--text); margin-bottom:10px;">รายงานตัวสำเร็จ!</h2>
          <p style="color:var(--muted); margin-bottom:30px; line-height:1.6;">ระบบได้บันทึกประวัติกำลังพล<br>ของคุณเข้าสู่ฐานข้อมูลเรียบร้อยแล้ว</p>
          <button class="btn" onclick="liff.closeWindow()">ปิดหน้าต่าง</button>
        </div>
      `;
    } else {
      customAlert(res.message, 'เกิดข้อผิดพลาด', '⚠️');
      btn.disabled = false;
      btn.textContent = 'ยืนยันการรายงานตัว';
    }
  } catch(err) {
    document.getElementById('ov-load').classList.add('hidden');
    customAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่', 'เชื่อมต่อล้มเหลว', '📡');
    btn.disabled = false;
    btn.textContent = 'ยืนยันการรายงานตัว';
  }
}

// API Helper 
async function callAPI(method, params, timeoutMs=15000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    let url = GAS_URL, opts = { signal:ctrl.signal, redirect:'follow' };
    if (method === 'GET') {
      url += '?' + new URLSearchParams(params).toString();
      opts.method = 'GET';
    } else {
      opts.method  = 'POST';
      opts.headers = { 'Content-Type':'text/plain' };
      opts.body    = JSON.stringify(params);
    }
    const resp = await fetch(url, opts);
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

init();
</script>
</body>
</html>
