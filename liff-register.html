<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Register</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1e3a8a; /* สีกรมท่าสำหรับหน่วยงาน */
  --secondary: #64748b;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --green: #059669; --red: #ef4444; --gold: #d97706;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }

/* Header & Profile */
.header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
.profile-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--primary); margin: 0 auto 15px; display: block; object-fit: cover; box-shadow: 0 10px 25px rgba(30,58,138,0.2); }
.org-name { font-size: 14px; color: var(--secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
.app-name { font-size: 26px; font-weight: 800; color: var(--primary); margin-top: 4px; line-height: 1.2; }

/* Cards */
.form-card, .registered-card { background: var(--surface); border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
.form-card { border-top: 6px solid var(--primary); }
.registered-card { border-top: 6px solid var(--green); text-align: center; }

/* Form Elements */
.form-group { margin-bottom: 18px; text-align: left; }
.form-label { display: block; font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.form-control { width: 100%; padding: 14px 16px; border: 1.5px solid #cbd5e1; border-radius: 12px; font-family: 'Sarabun'; font-size: 16px; transition: 0.3s; background: #f8fafc; color: var(--text);}
.form-control:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(30,58,138,0.1); }
select.form-control { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
select.form-control optgroup { font-weight: 700; color: var(--primary); }

/* Registered Info */
.info-box { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px 16px; margin-bottom: 24px; }
.info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 15px; text-align: left; align-items: flex-start; gap: 10px;}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--secondary); font-weight: 600; flex-shrink: 0;}
.info-value { color: var(--text); font-weight: 800; text-align: right;}

/* Buttons */
.btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 15px rgba(30,58,138,0.25); margin-top: 8px;}
.btn:active { transform: scale(0.96); box-shadow: none; }
.btn-outline { background: transparent; border: 2px solid #cbd5e1; color: var(--secondary); box-shadow: none; margin-top: 12px; padding: 14px;}
.btn-outline:active { background: #f1f5f9; }

/* Loading */
.loader { border: 4px solid #e2e8f0; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99; }
.hidden { display: none !important; }

/* 🌟 NEW: Custom Modal CSS (Native Look) */
.ca-ov { position: fixed; inset: 0; background: rgba(15,23,42,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.ca-msg { font-size: 15px; color: var(--secondary); margin-bottom: 24px; line-height: 1.6; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 14px 0; border-radius: 12px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(30,58,138,0.25); }
.ca-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<!-- หน้าจอโหลด -->
<div id="loading-screen">
  <div class="loader"></div>
  <div style="font-weight: 700; color: var(--text); font-size: 16px;" id="load-text">กำลังตรวจสอบประวัติ...</div>
</div>

<!-- 🌟 NEW: Custom Modal HTML -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<!-- ส่วนหัว และ รูปโปรไฟล์ LINE -->
<div class="header hidden" id="ui-header">
  <img src="" id="ui-profile-img" class="profile-img hidden" alt="LINE Profile">
  <div class="org-name" id="ui-org-name">Organization</div>
  <div class="app-name" id="ui-app-name">App Name</div>
</div>

<!-- การ์ดแจ้งเตือนกรณีลงทะเบียนแล้ว -->
<div class="registered-card hidden" id="ui-already-registered">
  <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
  <h2 style="font-size: 22px; margin-bottom: 5px; color: var(--primary); font-weight:800;">ท่านลงทะเบียนเรียบร้อยแล้ว</h2>
  <p style="color: var(--secondary); margin-bottom: 20px; font-size: 14px;">ฐานข้อมูลทำเนียบกำลังพลปัจจุบัน</p>
  
  <div class="info-box">
    <div class="info-row"><span class="info-label">ยศ</span><span class="info-value" id="info-rank">-</span></div>
    <div class="info-row"><span class="info-label">ชื่อ - สกุล</span><span class="info-value" id="info-fullname">-</span></div>
    <div class="info-row"><span class="info-label">ชื่อเล่น</span><span class="info-value" id="info-nickname">-</span></div>
    <div class="info-row"><span class="info-label">ตำแหน่ง</span><span class="info-value" id="info-duty">-</span></div>
    <div class="info-row"><span class="info-label">สังกัด</span><span class="info-value" id="info-unit" style="color: var(--primary);">-</span></div>
  </div>

  <button class="btn" onclick="liff.closeWindow()">เข้าสู่ระบบบทเรียน</button>
  <button class="btn btn-outline" onclick="showEditForm()">✏️ แก้ไขอัปเดตข้อมูล</button>
</div>

<!-- การ์ดฟอร์มลงทะเบียน (และแก้ไข) -->
<div class="form-card hidden" id="ui-form">
  <h2 id="form-title" style="font-size: 22px; margin-bottom: 24px; text-align: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; color: var(--primary); font-weight: 800;">ลงทะเบียนกำลังพล</h2>
  
  <div class="form-group">
    <label class="form-label">ยศ</label>
    <select class="form-control" id="inp-rank">
      <option value="" disabled selected>-- เลือกยศ --</option>
      <optgroup label="นายทหารสัญญาบัตร">
          <option value="พล.อ.">พล.อ.</option>
          <option value="พล.ท.">พล.ท.</option>
          <option value="พล.ต.">พล.ต.</option>
          <option value="พ.อ.(พิเศษ)">พ.อ.(พิเศษ)</option>
          <option value="พ.อ.">พ.อ.</option>
          <option value="พ.ท.">พ.ท.</option>
          <option value="พ.ต.">พ.ต.</option>
          <option value="ร.อ.">ร.อ.</option>
          <option value="ร.ท.">ร.ท.</option>
          <option value="ร.ต.">ร.ต.</option>
      </optgroup>
      <optgroup label="นายทหารประทวน">
          <option value="จ.ส.อ.(พิเศษ)">จ.ส.อ.(พิเศษ)</option>
          <option value="จ.ส.อ.">จ.ส.อ.</option>
          <option value="จ.ส.ท.">จ.ส.ท.</option>
          <option value="จ.ส.ต.">จ.ส.ต.</option>
          <option value="ส.อ.">ส.อ.</option>
          <option value="ส.ท.">ส.ท.</option>
          <option value="ส.ต.">ส.ต.</option>
      </optgroup>
      <optgroup label="พลทหาร / อื่นๆ">
          <option value="พลฯ">พลทหาร (พลฯ)</option>
          <option value="นรต.">นรต. / นนส.</option>
          <option value="พนักงานราชการ">พนักงานราชการ</option>
          <option value="ลูกจ้าง">ลูกจ้าง</option>
      </optgroup>
    </select>
  </div>
  
  <div class="form-group">
    <label class="form-label">ชื่อ - สกุล</label>
    <input type="text" class="form-control" id="inp-fullname" placeholder="เช่น: สมชาย รักชาติ">
  </div>
  
  <div class="form-group">
    <label class="form-label">ชื่อเล่น</label>
    <input type="text" class="form-control" id="inp-nickname" placeholder="เช่น: ชาย">
  </div>
  
  <div style="display: flex; gap: 10px;">
    <div class="form-group" style="flex: 1;">
      <label class="form-label">ตำแหน่ง</label>
      <input type="text" class="form-control" id="inp-duty" placeholder="เช่น: ผบ.หมู่">
    </div>
    <div class="form-group" style="flex: 1.5;">
      <label class="form-label">สังกัด</label>
      <input type="text" class="form-control" id="inp-unit" placeholder="เช่น: ร้อย.อวบ.ที่ 1">
    </div>
  </div>

  <button class="btn" id="btn-submit" onclick="submitData()">บันทึกฐานข้อมูล</button>
  <button class="btn btn-outline hidden" id="btn-cancel-edit" onclick="cancelEdit()">ยกเลิก</button>
</div>

<script>
const LIFF_ID = '2009717287-28e2ynXL';   
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

let profile = null;
let existingMember = null;
let appConfig = null;

// 🌟 NEW: Custom Modal Functions
let alertCallback = null;
function customAlert(msg, title="แจ้งเตือน", icon="⚠️", callback=null) {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  alertCallback = callback;
  document.getElementById('ca-btn-group').innerHTML = `<button class="ca-btn ca-btn-confirm" id="btn-ca-ok">รับทราบ</button>`;
  document.getElementById('btn-ca-ok').onclick = () => { closeCustomAlert(); if(alertCallback) alertCallback(); };
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.remove('active'); }

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    profile = await liff.getProfile();
    
    if (profile.pictureUrl) {
      const img = document.getElementById('ui-profile-img');
      img.src = profile.pictureUrl;
      img.classList.remove('hidden');
    }

    const [configRes, memberRes] = await Promise.all([
      callAPI('GET', { action: 'get_config' }),
      callAPI('GET', { action: 'get_member', userId: profile.userId })
    ]);
    
    if (configRes.status === 'ok') { appConfig = configRes.config; applyTemplate(appConfig); }
    
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('ui-header').classList.remove('hidden');

    if (memberRes.status === 'ok' && memberRes.member) {
      existingMember = memberRes.member;
      showRegisteredInfo();
    } else {
      document.getElementById('ui-form').classList.remove('hidden');
    }

  } catch(e) {
    document.getElementById('load-text').textContent = "เกิดข้อผิดพลาด: " + e.message;
    document.getElementById('load-text').style.color = "red";
  }
}

function applyTemplate(config) {
  // หากมีการตั้งค่าสี Primary ในระบบ ให้ดึงมาใช้
  if(config.colorPrimary) {
     document.documentElement.style.setProperty('--primary', config.colorPrimary);
  }
  document.title = config.appName + " - ลงทะเบียน";
  document.getElementById('ui-app-name').textContent = config.appName;
  document.getElementById('ui-org-name').textContent = config.orgName || 'ทำเนียบกำลังพล';
}

function showRegisteredInfo() {
  document.getElementById('ui-form').classList.add('hidden');
  document.getElementById('ui-already-registered').classList.remove('hidden');
  
  document.getElementById('info-rank').textContent = existingMember.rank || '-';
  document.getElementById('info-fullname').textContent = existingMember.fullName || '-';
  document.getElementById('info-nickname').textContent = existingMember.nickname || '-';
  
  // แยก ตำแหน่ง และ สังกัด ออกจากกันเพื่อแสดงผล
  let pos = existingMember.position || '-';
  let duty = pos;
  let unit = '-';
  if(pos.includes(' - ')) {
      let parts = pos.split(' - ');
      duty = parts[0];
      unit = parts.slice(1).join(' - '); // เผื่อสังกัดมีขีดด้วย
  }
  
  document.getElementById('info-duty').textContent = duty;
  document.getElementById('info-unit').textContent = unit;
}

function showEditForm() {
  document.getElementById('ui-already-registered').classList.add('hidden');
  document.getElementById('ui-form').classList.remove('hidden');
  
  document.getElementById('form-title').textContent = "แก้ไขประวัติส่วนตัว";
  document.getElementById('btn-submit').textContent = "อัปเดตข้อมูล";
  document.getElementById('btn-cancel-edit').classList.remove('hidden');
  
  if (existingMember) {
    // ป้อนข้อมูลเก่ากลับเข้า Form
    const rankDropdown = document.getElementById('inp-rank');
    let rankFound = false;
    for(let i=0; i<rankDropdown.options.length; i++) {
        if(rankDropdown.options[i].value === existingMember.rank) {
            rankDropdown.selectedIndex = i;
            rankFound = true; break;
        }
    }
    if(!rankFound) rankDropdown.value = ''; // ป้องกันบัคถ้ายศเปลี่ยน
    
    document.getElementById('inp-fullname').value = existingMember.fullName || '';
    document.getElementById('inp-nickname').value = existingMember.nickname || '';
    
    let pos = existingMember.position || '';
    let duty = pos;
    let unit = '';
    if(pos.includes(' - ')) {
        let parts = pos.split(' - ');
        duty = parts[0];
        unit = parts.slice(1).join(' - ');
    }
    document.getElementById('inp-duty').value = duty;
    document.getElementById('inp-unit').value = unit;
  }
}

function cancelEdit() { showRegisteredInfo(); }

async function submitData() {
  const rank = document.getElementById('inp-rank').value;
  const fullname = document.getElementById('inp-fullname').value.trim();
  const nickname = document.getElementById('inp-nickname').value.trim();
  const duty = document.getElementById('inp-duty').value.trim();
  const unit = document.getElementById('inp-unit').value.trim();

  // Validate fields
  if(!rank || !fullname || !nickname || !duty || !unit) {
    return customAlert('กรุณากรอกข้อมูล ยศ ชื่อ-สกุล ชื่อเล่น ตำแหน่ง และสังกัด ให้ครบทุกช่องครับ', 'ข้อมูลไม่ครบถ้วน', '⚠️');
  }

  const btn = document.getElementById('btn-submit');
  const isEditing = !!existingMember;
  btn.textContent = 'กำลังบันทึกฐานข้อมูล...'; btn.disabled = true;

  // นำตำแหน่งและสังกัดมาต่อกันด้วย " - " เพื่อให้หลังบ้านทำงานต่อได้ทันทีโดยไม่ต้องแก้โค้ด Google Apps Script
  const combinedPosition = duty + ' - ' + unit;

  try {
    const res = await callAPI('POST', {
      action: 'liff_register',
      userId: profile.userId,
      displayName: profile.displayName,
      pictureUrl: profile.pictureUrl,
      rank: rank,
      fullName: fullname,
      nickname: nickname,
      position: combinedPosition
    });
    
    if(res.status === 'ok') {
      customAlert(isEditing ? 'อัปเดตประวัติกำลังพลของท่านเรียบร้อยแล้ว' : 'ยินดีต้อนรับเข้าสู่ระบบจัดการฝึกครับ', 'บันทึกสำเร็จ!', '✅', () => {
        liff.closeWindow();
      });
    } else { throw new Error(res.message); }
  } catch(e) {
    customAlert(e.message, 'เกิดข้อผิดพลาด', '❌');
    btn.textContent = isEditing ? 'อัปเดตข้อมูล' : 'บันทึกฐานข้อมูล'; 
    btn.disabled = false;
  }
}

async function callAPI(method, params) {
  let url = GAS_URL, opts = { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(params) };
  if(method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts = {method:'GET'}; }
  const resp = await fetch(url, opts);
  return await resp.json();
}

init();
</script>
</body>
</html>
